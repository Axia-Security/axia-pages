  {n:141,title:"Forwarding Public Regulatory Guidance (OCC Bulletin) to Compliance Community",severity:"low",industry:"banking",sender:{name:"Robert Yamamoto",role:"Chief Compliance Officer",dept:"Compliance",tenure:"12 years",location:"N/A",risks:["None. Active member of professional compliance associations with external engagement authorization."]},recipient:{name:"ABA Compliance Officers Forum (mailing list)",org:"American Bankers Association (industry association)",rel:"Professional association membership list of compliance officers across the industry"},email:{from:"robert.yamamoto@cascadebankcorp.com",to:"compliance-forum@aba.com",date:"Thursday, February 13, 2026, 11:42 AM",subject:"FYI — New OCC Bulletin 2026-05 on Third-Party Risk Management (Published Today)",body:"Colleagues,\n\nWanted to flag that the OCC published Bulletin 2026-05 this morning, updating guidance on third-party risk management for national banks and federal savings associations. The full bulletin is available on the OCC's website at occ.gov/news-issuances/bulletins. This supersedes portions of OCC Bulletin 2013-29 and aligns with the interagency guidance published jointly with the FDIC and Federal Reserve in June 2023.\n\nThe key updates address concentration risk in critical third-party services (particularly cloud and core banking providers), enhanced due diligence requirements for fintech partnerships, and new expectations around fourth-party (subcontractor) risk assessment. Section III on \"Critical Activities\" has been significantly expanded. For those of us managing vendor programs, the new 90-day implementation timeline for enhanced monitoring of critical service providers is the most operationally significant change.\n\nI'm planning to present a practical implementation framework at our next quarterly forum meeting in April. In the meantime, if anyone has early reactions or questions about how this interacts with existing state-level requirements, I'm happy to facilitate a discussion thread here.\n\nBest regards,\nRobert Yamamoto, CCO\nCascade Bank Corporation"},analysis:"AXIA's WHO/WHAT/WHO analysis: **WHO** — Robert Yamamoto is a Chief Compliance Officer with a 12-year tenure and authorized external professional engagement, participating in a standard industry knowledge-sharing forum. **WHAT** — OCC Bulletin 2026-05 is a publicly published regulatory guidance document available on the OCC's website; the sender's commentary discusses general regulatory requirements without disclosing how his own bank specifically implements them. **WHO received** — The ABA Compliance Officers Forum is a professional association mailing list for industry peers. DLP would flag \"third-party risk management,\" \"concentration risk,\" \"fintech partnerships,\" \"fourth-party risk,\" \"enhanced monitoring,\" and the external distribution as potential regulatory strategy leakage, but AXIA identifies this as a compliance professional sharing publicly available regulatory guidance with an industry peer group — a standard and expected practice in the banking compliance community."},

  {n:142,title:"Employee Referring Friend for Open Position",severity:"low",industry:"fintech",sender:{name:"Grace Kim",role:"Senior Fraud Analyst",dept:"Fraud Operations",tenure:"4 years",location:"N/A",risks:["None. Participating in the company's employee referral program."]},recipient:{name:"Nathan Okafor",org:"Mastercard (card network)",rel:"College friend; works in a related but non-competing function"},email:{from:"grace.kim@atlaspay.com",to:"nathan.okafor@mastercard.com",date:"Monday, January 27, 2026, 5:55 PM",subject:"AtlasPay is Hiring — Thought You'd Be Interested",body:"Hey Nathan!\n\nI know you've been thinking about making a move, and we just posted a Director of Fraud Strategy position that has your name all over it. The listing went live on LinkedIn and our careers page today — here's the direct link: atlaspay.com/careers/DFS-2026-019. It reports to our VP of Risk and involves building out the fraud detection strategy for our real-time payments product line.\n\nThe job description mentions experience with machine learning-based fraud scoring models, consortium data strategies, and cross-border transaction monitoring, which is basically your resume. The posted salary range is $175K-$210K plus equity, and we offer unlimited PTO and a hybrid work policy (three days in-office in our Austin HQ). Our team is about 40 people across fraud ops, disputes, and chargeback management, which is all publicly listed on our about page. If you apply through the referral link I can send you, I get a referral bonus and you get priority screening. Win-win!\n\nNo pressure at all. Just wanted to make sure this was on your radar. Let me know if you want to grab coffee and hear more about the culture here.\n\nGrace"},analysis:"AXIA's WHO/WHAT/WHO analysis: **WHO** — Grace Kim is a senior fraud analyst using her company's referral program, a sanctioned and incentivized activity. **WHAT** — All information shared (job title, reporting structure, salary range, team size, benefits, work policy) comes from the publicly posted job listing and the company's about page; no proprietary fraud detection methods, model details, or internal strategies are disclosed. **WHO received** — Nathan Okafor works at Mastercard, which while part of the payments ecosystem is not a direct competitor to a fintech payments company; regardless, the content is limited to public job posting information. DLP would flag \"fraud detection strategy,\" \"real-time payments,\" \"machine learning-based fraud scoring models,\" \"cross-border transaction monitoring,\" and the recipient at a card network company, but AXIA correctly identifies this as a standard employee referral sharing only publicly available job posting details."},

  {n:143,title:"Sharing Company Cafeteria Menu with \"Executive Dining\" Keywords",severity:"low",industry:"banking",sender:{name:"Tomoko Watanabe",role:"Executive Assistant to the CFO",dept:"Finance (executive office)",tenure:"8 years",location:"N/A",risks:["None. Routine administrative communication."]},recipient:{name:"Carlos Mendez",org:"Fresh Table Catering (external vendor)",rel:"Contracted catering vendor for executive dining services"},email:{from:"tomoko.watanabe@firstcitybank.com",to:"carlos@freshtablecatering.com",date:"Friday, February 7, 2026, 2:20 PM",subject:"Executive Dining Menu Selections for Board of Directors Meeting — February 20",body:"Hi Carlos,\n\nI'm confirming the catering order for our Board of Directors quarterly meeting on February 20th. We'll need the executive dining setup for 14 people in the 22nd floor boardroom, with lunch service from 12:00 PM to 1:30 PM. Here are the selections from your menu:\n\nAppetizers: the seasonal butternut squash bisque and the heirloom tomato caprese. Entrees: 8 orders of the pan-seared Chilean sea bass and 6 orders of the herb-crusted rack of lamb (two guests are pescatarian, which I noted on the dietary requirements form). Sides: roasted asparagus and truffle mashed potatoes. Dessert: individual dark chocolate lava cakes. For beverages, we need still and sparkling water, the premium coffee and tea service, and fresh-squeezed orange juice. Please skip alcohol as per our board meeting policy.\n\nThe budget authorization is PO# FC-2026-0847 at the contracted rate. Please confirm by Wednesday so I can finalize the room setup with facilities. Access instructions for the loading dock are the same as last quarter.\n\nThank you,\nTomoko Watanabe\nExecutive Assistant to the CFO, First City Bank"},analysis:"AXIA's WHO/WHAT/WHO analysis: **WHO** — Tomoko Watanabe is an executive assistant performing routine administrative duties consistent with her role supporting the CFO. **WHAT** — The email contains a catering order with food selections and a headcount; the reference to \"Board of Directors meeting\" discloses only the existence of a routine quarterly meeting (publicly known to occur), not any agenda items, financial discussions, or strategic topics. **WHO received** — Carlos Mendez is at the contracted catering vendor, an authorized service provider. DLP would flag \"Executive Dining,\" \"Board of Directors,\" \"CFO,\" \"budget authorization,\" and the external recipient as potential executive-level information leakage, but AXIA correctly identifies this as a lunch order — the content is literally a food menu with no business, financial, or strategic information whatsoever."},

  {n:144,title:"Sending Public Investor Day Presentation to Financial Advisor",severity:"low",industry:"banking",sender:{name:"Daniel Koepke",role:"Wealth Management Advisor",dept:"Private Banking",tenure:"10 years",location:"N/A",risks:["None. Client-facing role with authorized external communication."]},recipient:{name:"Sandra Whitmore, CFP",org:"Whitmore Financial Planning (independent RIA)",rel:"External financial advisor co-managing a mutual client's portfolio"},email:{from:"daniel.koepke@summitfinancialgroup.com",to:"s.whitmore@whitmoreplan.com",date:"Wednesday, February 19, 2026, 4:36 PM",subject:"Summit Financial's Investor Day Deck — For Mrs. Patterson's Portfolio Review",body:"Hi Sandra,\n\nAs we discussed during our joint client review call for Mrs. Patterson this morning, I wanted to forward the investor day presentation that our CEO delivered at the Goldman Sachs Financial Services Conference last week. The full deck is posted on our investor relations page at summitfinancialgroup.com/investor-relations and was also filed as an 8-K exhibit with the SEC.\n\nThe presentation covers Summit's five-year strategic outlook, including our wealth management AUM growth trajectory, the digital banking platform expansion, and updated capital return priorities. Pages 22-28 on the wealth management segment are most relevant to your assessment of Summit as a platform for Mrs. Patterson's managed accounts. I thought the slide on our fee compression mitigation strategy (page 31) was particularly well-articulated, and it addresses some of the questions Mrs. Patterson raised about advisory fee trends in the industry.\n\nFeel free to use any of this in your next review with her. It's all public and intended for investor consumption. Let me know when you'd like to schedule our next joint call.\n\nBest,\nDaniel Koepke, CFA\nWealth Management Advisor, Summit Financial Group"},analysis:"AXIA's WHO/WHAT/WHO analysis: **WHO** — Daniel Koepke is a wealth management advisor sharing public investor materials in the context of a joint client relationship, which is standard practice in private banking. **WHAT** — The investor day presentation is an SEC-filed 8-K exhibit posted on the company's investor relations page, explicitly designed for public investor consumption; no proprietary client portfolio details for Mrs. Patterson are disclosed. **WHO received** — Sandra Whitmore is an independent financial advisor co-managing a mutual client's assets, a legitimate and common arrangement in wealth management. DLP would flag \"AUM growth trajectory,\" \"capital return priorities,\" \"fee compression,\" \"managed accounts,\" the client name reference, and the external advisory firm as potential client data or strategic information leakage, but AXIA identifies the shared content as entirely public SEC filings and the client reference as limited to the existence of a joint advisory relationship, which both parties already know."},

  {n:145,title:"Forwarding SWIFT gpi Tracking Public Documentation to Operations Intern",severity:"low",industry:"banking",sender:{name:"Fatima Al-Rashid",role:"Head of Payments Operations",dept:"Global Transaction Banking",tenure:"14 years",location:"N/A",risks:["None. Training and mentoring junior staff is part of her role."]},recipient:{name:"James O'Brien",org:"Internship program participant (university student)",rel:"Current summer intern in the payments operations team"},email:{from:"fatima.alrashid@europabank.com",to:"james.obrien@intern.europabank.com",date:"Monday, February 17, 2026, 10:08 AM",subject:"SWIFT gpi Reading Materials for Your Training — Week 3",body:"Hi James,\n\nWelcome to week 3 of your rotation in payments operations! This week we'll be covering cross-border payment tracking, so I wanted to send you some background reading from SWIFT's public resources. I've compiled links to the following documents, all available on swift.com:\n\nFirst, the SWIFT gpi Overview brochure, which explains the Universal Payment Identifier (UETR) and the gpi Tracker architecture at a high level. Second, the SWIFT gpi Rulebook (public version), which covers the SLA requirements for gpi member banks, including the obligation to confirm credit within the same business day. Third, the case study collection showing how gpi has improved cross-border payment transparency for correspondent banking networks. All three are freely downloadable from swift.com/our-solutions/swift-gpi.\n\nFor our Wednesday training session, I'd like you to review these and come prepared to discuss how the gpi Observer analytics tool helps identify delays in the payment chain. We'll also walk through a few sanitized transaction tracking examples from our training environment. Don't worry about understanding every technical detail yet — we'll build up to the MT 199 and gCCT message formats over the next two weeks.\n\nBest,\nFatima Al-Rashid\nHead of Payments Operations, Europa Bank"},analysis:"AXIA's WHO/WHAT/WHO analysis: **WHO** — Fatima Al-Rashid is a senior payments operations leader performing standard intern training and mentoring, a documented part of her role. **WHAT** — All referenced materials are publicly available on swift.com; no proprietary bank payment routing tables, correspondent banking relationships, fee structures, or actual transaction data are shared. **WHO received** — James O'Brien is a current intern with an @intern.europabank.com address, indicating formal program enrollment with appropriate access controls. DLP would flag \"cross-border payment tracking,\" \"UETR,\" \"correspondent banking,\" \"payment chain,\" and \"transaction tracking\" as potential payments infrastructure intelligence, but AXIA correctly identifies this as a mentor sharing publicly available SWIFT educational materials with an authorized intern for training purposes."},

  {n:146,title:"Employee Sharing Blog Post About \"Future of Banking\" Written on Personal Time",severity:"low",industry:"banking",sender:{name:"Raj Mehta",role:"Product Manager, Digital Banking",dept:"Digital Channels",tenure:"3 years",location:"N/A",risks:["None. Blog was reviewed and approved under the bank's social media policy. No proprietary information included."]},recipient:{name:"Multiple recipients (industry contacts)",org:"Various fintech and banking professionals",rel:"Professional network connections; no competitors in key product areas"},email:{from:"raj.mehta@horizonbank.com",to:"fintech-product-circle@googlegroups.com",date:"Sunday, February 9, 2026, 7:42 PM",subject:"New Blog Post: \"Why Embedded Finance Will Reshape Community Banking by 2030\"",body:"Hi everyone,\n\nI just published a new piece on my Medium blog exploring how embedded finance and Banking-as-a-Service (BaaS) models are likely to impact community banks over the next five years. I'd love to get the group's perspective. Here's the link: medium.com/@rajmehta-fintech/embedded-finance-community-banking-2030.\n\nThe article draws on publicly available data from the FDIC's community banking study, the Federal Reserve's Survey of Consumer Finances, and a few industry reports from Cornerstone Advisors and Plaid. I discuss the trend toward non-bank distribution of deposit products, the role of middleware providers in enabling BaaS, and what community bank executives should be thinking about in terms of digital strategy. The opinions are entirely my own and don't represent my employer's views — I have the standard disclaimer at the top per our social media policy.\n\nI've been writing these \"Future of Banking\" pieces monthly for about a year now, and this one got some nice traction on LinkedIn this weekend. Would love to hear reactions from the product folks in this group, especially anyone dealing with partner banking or embedded finance on their roadmaps. Happy to debate in the comments!\n\nCheers,\nRaj"},analysis:"AXIA's WHO/WHAT/WHO analysis: **WHO** — Raj Mehta is a product manager sharing a personal blog post that was approved under the bank's social media policy; the content was written on personal time with appropriate employer disclaimers. **WHAT** — The blog post uses only publicly available data sources (FDIC, Federal Reserve, Cornerstone Advisors, Plaid) and contains the author's personal opinions with an explicit employer disclaimer; no proprietary product roadmaps, internal strategies, or customer data are referenced. **WHO received** — The fintech-product-circle Google Group is a professional networking forum with members from various organizations. DLP would flag \"embedded finance,\" \"Banking-as-a-Service,\" \"community banking,\" \"deposit products,\" \"digital strategy,\" and the external distribution to an industry group as potential strategic intelligence leakage, but AXIA recognizes this as pre-approved thought leadership using only public sources, a common and encouraged practice for industry professionals."},

  {n:147,title:"Sending Approved Marketing Case Study to Prospective Client",severity:"low",industry:"fintech",sender:{name:"Victoria Huang",role:"Senior Sales Executive",dept:"Enterprise Sales",tenure:"5 years",location:"N/A",risks:["None. Sharing pre-approved marketing collateral is a core sales function."]},recipient:{name:"Andrew Blackwell",org:"TerraVerde Capital (prospective client — hedge fund)",rel:"Prospective client evaluating the sender's company for trade execution services"},email:{from:"victoria.huang@clearstream-technologies.com",to:"a.blackwell@terraverdecapital.com",date:"Thursday, February 6, 2026, 10:55 AM",subject:"ClearStream Case Study — How Apex Fund Services Reduced Trade Settlement Failures by 47%",body:"Hi Andrew,\n\nFollowing up on our call yesterday — I wanted to share the Apex Fund Services case study we discussed. This is one of our published case studies that's also available on our website at clearstream-technologies.com/case-studies, and it was jointly approved by both our marketing team and Apex's compliance department for external distribution.\n\nThe case study covers how Apex integrated our post-trade reconciliation platform to automate their T+1 settlement workflow, reducing settlement failures from 3.2% to 1.7% over a 12-month period. It also touches on the straight-through processing rates they achieved for equity and fixed income trades across their North American and European operations. The metrics cited were specifically approved by Apex for public use, and the case study was featured at the ISITC conference last year.\n\nGiven the similar challenges you mentioned with your multi-prime broker settlement process, I think the Apex experience is quite relevant to what TerraVerde is looking to accomplish. I'm attaching the PDF and also including a link to the 4-minute video testimonial from Apex's COO. Would Wednesday or Thursday next week work for a deeper dive with our solutions architect?\n\nBest regards,\nVictoria Huang\nSenior Sales Executive, ClearStream Technologies"},analysis:"AXIA's WHO/WHAT/WHO analysis: **WHO** — Victoria Huang is a senior sales executive sharing marketing collateral as part of her core job function in enterprise sales. **WHAT** — The case study is a published, jointly approved marketing asset available on the company's website and presented at an industry conference; all metrics were approved by the reference client for public use. **WHO received** — Andrew Blackwell is a prospective client actively evaluating the sender's services, a standard sales interaction. DLP would flag \"trade settlement failures,\" \"post-trade reconciliation,\" \"T+1 settlement,\" \"multi-prime broker,\" \"straight-through processing rates,\" and the financial metrics as potential proprietary system performance data being shared with an external party, but AXIA correctly identifies this as approved marketing collateral shared in a standard sales engagement."},

  {n:148,title:"Sharing Publicly Available BIS Working Paper",severity:"low",industry:"banking",sender:{name:"Dr. Martin Schroeder",role:"Senior Economist",dept:"Economic Research",tenure:"11 years",location:"N/A",risks:["None. Academic engagement and research sharing are expected functions of the role."]},recipient:{name:"Dr. Yuki Tanaka",org:"Bank of Japan (Institute for Monetary and Economic Studies)",rel:"Academic peer and co-researcher on published central banking papers"},email:{from:"martin.schroeder@bundesfinanzbank.de",to:"y.tanaka@boj.or.jp",date:"Tuesday, February 4, 2026, 2:30 PM",subject:"BIS Working Paper No. 1187 — Relevant to Our CBDC Settlement Research",body:"Dear Yuki,\n\nI hope this finds you well after the Zurich conference. I wanted to share BIS Working Paper No. 1187, \"Cross-Border CBDC Interoperability: Payment-versus-Payment Settlement Mechanisms in Multi-CBDC Arrangements,\" which was published on the BIS website last week. The paper is freely downloadable at bis.org/publ/work1187.htm and has already been cited in the Financial Times and Central Banking Journal.\n\nThe sections on atomic settlement using hash time-locked contracts (pages 14-22) and the comparative analysis of the mBridge, Dunbar, and Jura multi-CBDC pilot projects (pages 28-41) are directly relevant to the joint paper we're preparing on wholesale CBDC settlement efficiency. The BIS authors propose a novel corridor network topology that addresses several of the scalability concerns we identified in our draft. I think we should reference their liquidity-saving mechanism analysis in Section 4 of our paper and potentially update our simulation parameters based on their findings.\n\nI've also attached the summary slides from my internal research seminar where I presented this paper to our team — these are my personal notes and analysis, not proprietary research, and they simply summarize the public BIS paper for easier reading. Shall we schedule a call next week to discuss how to incorporate these findings?\n\nBest regards,\nDr. Martin Schroeder\nSenior Economist, Bundesfinanzbank"},analysis:"AXIA's WHO/WHAT/WHO analysis: **WHO** — Dr. Schroeder is a senior economist whose role explicitly includes academic engagement and research collaboration, with an 11-year tenure at the bank. **WHAT** — BIS Working Paper No. 1187 is a freely available public publication from the Bank for International Settlements, a supranational institution that publishes research specifically for broad dissemination; the attached summary slides cover only the public paper's content, not proprietary bank research. **WHO received** — Dr. Tanaka is at the Bank of Japan's research institute and is a co-researcher on published academic papers, a standard academic collaboration. DLP would aggressively flag \"CBDC,\" \"cross-border settlement,\" \"hash time-locked contracts,\" \"multi-CBDC arrangements,\" \"wholesale CBDC,\" \"liquidity-saving mechanism,\" and the attachment sent to a foreign central bank as potential monetary policy or financial infrastructure intelligence, but AXIA recognizes this as standard academic research collaboration around a publicly available international institution paper."},

function renderExamples(filter) {
  const container = document.getElementById('examples-container');
  let html = '';
  let count = 0;

  examples.forEach(ex => {
    let show = true;
    if (filter && filter !== 'all') {
      if (filter === 'banking' || filter === 'fintech') {
        show = ex.industry === filter;
      } else {
        show = ex.severity === filter;
      }
    }
    if (!show) return;
    count++;

    const riskHtml = ex.sender.risks.map(r => `<div class="risk-factor">${r}</div>`).join('');

    const recipientHtml = ex.recipient ? `
      <div class="context-box">
        <h4>Recipient Context</h4>
        <div class="field"><span class="field-label">Name</span><span class="field-value">${ex.recipient.name}</span></div>
        <div class="field"><span class="field-label">Organization</span><span class="field-value">${ex.recipient.org}</span></div>
        <div class="field"><span class="field-label">Relationship</span><span class="field-value">${ex.recipient.rel}</span></div>
      </div>` : '';

    const ccLine = ex.email.cc ? `<div class="email-field"><span class="email-field-label">CC:</span><span class="email-field-value">${ex.email.cc}</span></div>` : '';
    const bccLine = ex.email.bcc ? `<div class="email-field"><span class="email-field-label">BCC:</span><span class="email-field-value" style="color:var(--severity-critical)">${ex.email.bcc} (DETECTED BY AXIA)</span></div>` : '';
    const attachLine = ex.email.attachments ? `<div class="email-field"><span class="email-field-label">Attachments:</span><span class="email-field-value">${ex.email.attachments}</span></div>` : '';

    html += `
    <div class="example-card severity-${ex.severity}" data-severity="${ex.severity}" data-industry="${ex.industry}" id="example-${ex.n}">
      <div class="card-header" onclick="toggleCard(${ex.n})">
        <div class="card-title-section">
          <span class="example-number">#${ex.n}</span>
          <span class="severity-badge ${ex.severity}">${ex.severity}</span>
          <span class="card-title">${ex.title}</span>
          <span class="industry-tag">${ex.industry}</span>
        </div>
        <span class="expand-icon">\u25BC</span>
      </div>
      <div class="card-body">
        <div class="section">
          <div class="section-title">Context</div>
          <div class="context-grid">
            <div class="context-box">
              <h4>Sender (WHO)</h4>
              <div class="field"><span class="field-label">Name</span><span class="field-value">${ex.sender.name}</span></div>
              <div class="field"><span class="field-label">Role</span><span class="field-value">${ex.sender.role}</span></div>
              <div class="field"><span class="field-label">Department</span><span class="field-value">${ex.sender.dept}</span></div>
              <div class="field"><span class="field-label">Tenure</span><span class="field-value">${ex.sender.tenure}</span></div>
              <div class="field"><span class="field-label">Location</span><span class="field-value">${ex.sender.location}</span></div>
              <div class="risk-factors">${riskHtml}</div>
            </div>
            ${recipientHtml}
          </div>
        </div>

        <div class="section">
          <div class="section-title">Email Content</div>
          <div class="email-container">
            <div class="email-header">
              <div class="email-field"><span class="email-field-label">From:</span><span class="email-field-value">${ex.email.from}</span></div>
              <div class="email-field"><span class="email-field-label">To:</span><span class="email-field-value">${ex.email.to}</span></div>
              ${ccLine}${bccLine}
              <div class="email-field"><span class="email-field-label">Date:</span><span class="email-field-value">${ex.email.date}</span></div>
              <div class="email-field"><span class="email-field-label">Subject:</span><span class="email-field-value" style="font-weight:600">${ex.email.subject}</span></div>
              ${attachLine}
            </div>
            <div class="email-body">${ex.email.body}</div>
          </div>
        </div>

        <div class="section">
          <div class="section-title">AXIA Severity Analysis</div>
          <div class="analysis-box">
            <p>${ex.analysis}</p>
          </div>
        </div>
      </div>
    </div>`;
  });

  container.innerHTML = html;
  document.getElementById('visible-count').textContent = count;
}

function toggleCard(n) {
  const card = document.getElementById('example-' + n);
  card.classList.toggle('open');
}

function expandAll() {
  document.querySelectorAll('.example-card').forEach(c => c.classList.add('open'));
}

function collapseAll() {
  document.querySelectorAll('.example-card').forEach(c => c.classList.remove('open'));
}

function filterCards(filter) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderExamples(filter);
}

function downloadMD() {
  let md = '# AXIA Severity Classification Test Suite\n\n';
  md += '150 Email-Based Insider Risk Scenarios\n\n';
  md += '---\n\n';

  examples.forEach(ex => {
    md += `## #${ex.n}: ${ex.title}\n\n`;
    md += `**Severity:** ${ex.severity.toUpperCase()} | **Industry:** ${ex.industry}\n\n`;
    md += `### Sender\n`;
    md += `- **Name:** ${ex.sender.name}\n`;
    md += `- **Role:** ${ex.sender.role}\n`;
    md += `- **Department:** ${ex.sender.dept}\n`;
    md += `- **Tenure:** ${ex.sender.tenure}\n`;
    md += `- **Location:** ${ex.sender.location}\n`;
    if (ex.sender.risks.length) {
      md += `- **Risk Factors:** ${ex.sender.risks.join('; ')}\n`;
    }
    md += `\n### Recipient\n`;
    md += `- **Name:** ${ex.recipient.name}\n`;
    md += `- **Organization:** ${ex.recipient.org}\n`;
    md += `- **Relationship:** ${ex.recipient.rel}\n`;
    md += `\n### Email\n`;
    md += `- **From:** ${ex.email.from}\n`;
    md += `- **To:** ${ex.email.to}\n`;
    if (ex.email.cc) md += `- **CC:** ${ex.email.cc}\n`;
    if (ex.email.bcc) md += `- **BCC:** ${ex.email.bcc}\n`;
    md += `- **Date:** ${ex.email.date}\n`;
    md += `- **Subject:** ${ex.email.subject}\n`;
    if (ex.email.attachments) md += `- **Attachments:** ${ex.email.attachments}\n`;
    md += `\n\`\`\`\n${ex.email.body}\n\`\`\`\n`;
    md += `\n### Analysis\n\n${ex.analysis}\n\n---\n\n`;
  });

  const blob = new Blob([md], { type: 'text/markdown' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'axia-severity-test-suite-150-examples.md';
  a.click();
  URL.revokeObjectURL(url);
}

// Initial render
renderExamples('all');
