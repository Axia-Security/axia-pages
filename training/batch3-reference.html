 "to": "klaus.weber@lonza.com", "date": "Monday, Mar 3, 2026, 4:30 PM", "subject": "Cost modeling reference for process optimization discussion", "body": "Klaus,\n\nThanks for the productive meeting last week on yield improvements. As we discussed, I'm sharing our internal cost models so your team can benchmark where the optimization opportunities are.\n\nI included models across the immunology portfolio, not just the compound we're contracted on, so you can see how our yield targets compare across programs. I think the broader context will help your team propose more impactful improvements.\n\nAttached:\n- Drug substance manufacturing cost model -- contracted compound (oncology)\n- Drug substance manufacturing cost models -- 4 additional immunology pipeline compounds (NOT in contract scope)\n- Raw material sourcing cost breakdowns by supplier\n- Internal yield target thresholds and batch failure rate benchmarks\n\nLet me know when your team has had a chance to review. I think there's a real opportunity to drive down COGS across the board.\n\nBest,\nEmily"}, "analysis": "**WHO** -- Senior Process Development Engineer sharing manufacturing data with a contracted CDMO partner. No departure signals, no financial motivation, no concealment. Her intent is genuinely collaborative -- she wants to improve manufacturing efficiency. **WHAT** -- Drug substance manufacturing cost models, raw material sourcing costs, yield targets, and batch failure benchmarks. Four of the five compound models are outside the contract scope, exposing AbbVie's manufacturing economics across its immunology portfolio. This is commercially sensitive (competitors and other CDMOs could use this to undercut pricing), but it is not patient data, not clinical trial data, and not MNPI. **WHO received** -- Technical lead at Lonza, an active contracted CDMO partner. There is a real business relationship and an existing contract with confidentiality provisions, but those provisions cover only the single contracted compound. The four additional compound models are shared without any contractual protection. Lonza serves multiple pharmaceutical companies and could use the cost intelligence in negotiations with AbbVie's competitors. This is HIGH rather than CRITICAL because: the recipient is a contracted partner with an existing relationship (not a competitor or unauthorized party), the intent is collaborative process improvement, and the data is manufacturing economics (not regulated or criminal). However, the scope expansion beyond the contract is a significant governance bypass that creates competitive exposure across four pipeline compounds. Manager notification, contract scope review, and Lonza acknowledgment of confidentiality for out-of-scope materials required.", "scores": {"content": 75, "behavior": 70, "context": 77, "overall": 74}, "data_sources": "- Email gateway\n- Document management system\n- Contract management system\n- HR records", "dlp_system": "Purview", "dlp_alerted": "No", "timeline": [], "tags": ["cdmo", "manufacturing-costs", "contract-scope", "lonza", "yield-targets", "immunology-portfolio", "governance-bypass"]}, {"n": 203, "title": "Offshore Wind Farm Site Assessment Data Shared with Joint Venture Partner's Unaffiliated Subsidiary", "industry": "energy", "severity": "high", "sender": {"name": "James Redhawk", "role": "Renewable Energy Development Manager", "dept": "New Energies", "location": "Reno, Nevada", "tenure": "Mar 2020", "risks": ["Eager to advance project timelines, personal rapport with recipient"]}, "recipient": {"name": "Lars Johansson", "org": "Equinor Renewables US (subsidiary of Equinor ASA)", "rel": "Equinor ASA is a JV partner with Chevron on a separate Gulf of Mexico offshore wind project. However, Equinor Renewables US is a separately managed subsidiary pursuing its own competitive offshore wind projects in the Atlantic. The JV NDA covers only the Gulf project, not Atlantic development. Redhawk and Johansson collaborate on the Gulf project and have developed a strong working rapport."}, "email": {"from": "james.redhawk@chevron.com", "to": "lars.johansson@equinor.com", "date": "Thursday, Mar 6, 2026, 3:15 PM", "subject": "Atlantic site data -- for context on our Gulf methodology", "body": "Lars,\n\nGreat progress on the Gulf project. As you mentioned wanting to understand how our site assessment methodology works at scale, I'm sharing our Atlantic coast assessments so you can see the full picture of how we approach different geographies.\n\nAttached:\n- Atlantic offshore wind site assessment reports (3 lease areas -- Virginia, North Carolina, New Jersey)\n- Seabed geotechnical survey summaries\n- Wind resource modeling outputs with capacity factor projections\n- Grid interconnection feasibility studies with utility cost estimates\n- Community engagement strategy documents for each lease area\n\nThese are from our independent Atlantic program, not the Gulf JV, but the methodology is the same and I think it'll be useful context for your team's planning.\n\nJames"}, "analysis": "**WHO** -- Renewable Energy Development Manager sharing site assessment data with a JV partner contact. No financial pressure, no departure, no concealment. His motivation is collaborative -- strengthening the working relationship and sharing methodology. He does not appear to recognize the competitive boundary between the Gulf JV and Atlantic independent development. **WHAT** -- Offshore wind site assessments, geotechnical surveys, wind resource models, grid interconnection studies, and community engagement strategies for three Atlantic lease areas. This is competitively sensitive development intelligence for areas where Equinor Renewables US may be bidding independently, but it is not regulated data, not MNPI, and not personal information. **WHO received** -- An employee of a JV partner's subsidiary. There is a real business relationship through the parent company JV, but the recipient's subsidiary competes independ ssaging.\n\nI'm sending the full emergency response playbook so your team gets the complete picture of how seriously we take operational safety. I think there's some really compelling narrative material in here about our response capabilities and preparedness.\n\nAttached:\n- Oil Spill Response Playbook (complete, including classified appendices)\n- Environmental sensitivity maps for Cook Inlet and North Slope\n- Pre-positioned equipment inventories\n- Emergency contractor contact list (240 contacts)\n- Response time commitment matrix\n- Regulatory notification sequences\n\nFeel free to share with your creative team. I think the \"24/7 readiness\" angle could be powerful for the campaign.\n\nBest,\nMichelle"}, "analysis": "**WHO** -- Crisis Communications Manager with no risk factors, genuinely trying to help the PR agency develop compelling brand messaging. Her enthusiasm (\"I think there's some really compelling narrative material\") shows well-intentioned oversharing rather than malicious intent. She simply doesn't realize the security implications of sharing the complete playbook. **WHAT** -- Classified oil spill response playbook including environmental sensitivity maps, pre-positioned equipment locations, emergency contractor contacts, response time commitments, and regulatory notification sequences. This operational security data could be exploited by adversarial actors and violates OPA 90 response plan confidentiality requirements. **WHO received** -- PR agency handling a consumer marketing campaign, well outside the scope of crisis response access. No NDA covering this material, and the agency forwarded materials internally to five team members none of whom are under confidentiality agreements. This is High rather than Critical because: the intent is clearly benign (improving brand messaging), the PR agency is a known vendor (not an adversary), and the data is operational (not financial MNPI or personal data). However, the OPA 90 compliance implications and the uncontrolled spread within the agency require immediate manager notification, material recall from the agency, and coaching on information classification.", "scores": {"content": 72, "behavior": 68, "context": 79, "overall": 73}, "data_sources": "Email gateway, Document management system, Vendor management records, Legal NDA database, HR records", "dlp_system": "Forcepoint", "dlp_alerted": "No", "timeline": [{"time": "Wednesday 2:00 PM", "desc": "PR agency requested 'background materials on company safety culture' for brand campaign"}, {"time": "Wednesday 3:30 PM", "desc": "Beaumont downloaded complete oil spill response playbook including classified appendices"}, {"time": "Wednesday 4:00 PM", "desc": "Emailed full playbook and contractor contact list to PR agency account manager"}, {"time": "Thursday 10:00 AM", "desc": "PR agency forwarded materials internally to five team members, none under NDA"}], "tags": ["scope-breach", "oil-spill", "crisis-response", "pr-agency", "opa-90", "classified-playbook", "unauthorized-sharing"]}, {"n": 205, "title": "Refinery operational efficiency benchmarks shared with industry benchmarking consortium beyond authorized data scope", "industry": "energy", "severity": "high", "sender": {"name": "Robert Castillo", "role": "Turnaround Planning Engineer", "dept": "Refining", "location": "Port Arthur, Texas", "tenure": "Jun 2015", "risks": ["Enthusiastic participant in industry working groups", "shared data beyond what was authorized for benchmarking"]}, "recipient": {"name": "Sandra Meyers", "org": "Solomon Associates (refining industry benchmarking consortium)", "rel": "Solomon Associates runs the industry's leading refining performance benchmarking study. Chevron participates in the annual study with specific data submission guidelines. Castillo's submission exceeded the authorized data scope by including proprietary turnaround methodology details and unit-level cost breakdowns."}, "email": {"from": "robert.castillo@chevron.com", " ion)", "to": "jennifer.walsh.pharma@gmail.com", "date": "Friday, Mar 7, 2026, 5:55 PM", "subject": "Interesting stuff from work", "body": "Hey Jen,\n\nHope the new gig at Novartis is going well! Miss having you on the team.\n\nI thought you might find these interesting -- we just finalized the pricing models for the CV launch. Some of the competitive parity numbers might surprise you (yes, including against your new employer's products!).\n\nAttached:\n- Launch pricing model (WAC-to-net price waterfall)\n- PBM rebate structure (Express Scripts, CVS Caremark, OptumRx)\n- Medicaid best price calculations\n- Competitive parity analysis vs. Entresto, Leqvio, and Kisqali\n\nDon't share these around obviously. Just thought you'd find the competitive positioning interesting given your new role.\n\nDrinks soon?\nAmanda"}, "analysis": "**WHO** -- Senior Pricing Analyst sharing with a former colleague who recently joined the direct competitor whose products are analyzed in the documents. The Friday 5:55 PM send time and use of personal Yahoo email from her corporate workstation suggest awareness of reduced monitoring. She also accessed the competitive parity analysis for the first time despite it not being in her assigned portfolio. **WHAT** -- Launch pricing models including WAC-to-net price waterfalls, PBM rebate structures, Medicaid best price calculations, and competitive parity analyses against three specific Novartis products. This gives Novartis direct insight into AbbVie's pricing strategy, net price floor, and negotiating boundaries for the cardiovascular launch. **WHO received** -- Former colleague who is now Pricing Director at Novartis -- the exact person who would benefit most from seeing competitive pricing intelligence. This is High rather than Critical because: the sharing appears to be casual professional networking (\"thought you'd find these interesting\") rather than deliberate espionage or paid intelligence gathering, and Richardson may not fully appreciate the competitive damage. However, the specificity of the data (competitive parity against Novartis products sent directly to a Novartis pricing director) makes this extremely damaging. Immediate manager notification, legal assessment of trade secret exposure, and investigation into whether this is a first offense or part of a pattern of sharing with the former colleague.", "scores": {"content": 81, "behavior": 75, "context": 79, "overall": 78}, "data_sources": "Email gateway, Personal email detection, Pricing database access logs, HR records, LinkedIn relationship mapping", "dlp_system": "Netskope", "dlp_alerted": "Yes", "timeline": [{"time": "Friday 3:00 PM", "desc": "Accessed pricing database and downloaded launch pricing models for cardiovascular product"}, {"time": "Friday 4:30 PM", "desc": "Downloaded competitive parity analysis against three Novartis products (first-time access)"}, {"time": "Friday 5:55 PM", "desc": "Forwarded pricing models and competitive analysis from personal Yahoo email to former colleague at Novartis"}, {"time": "Monday 9:00 AM", "desc": "DLP alert reviewed by security team; investigation initiated"}], "tags": ["competitor", "pricing-models", "novartis", "former-colleague", "personal-email", "market-access", "competitive-parity"]}, {"n": 210, "title": "Post-Market Adverse Event Trend Data Shared with Investor Relations Beyond Approved Disclosure Scope", "industry": "pharma", "severity": "high", "sender": {"name": "Gregory Stanton", "role": "Pharmacovigilance Signal Detection Lead", "dept": "Pharmacovigilance", "location": "Groton, Connecticut", "tenure": "Jul 2016", "risks": []}, "recipient": {"name": "Laura Chen, Michael Reeves, Sarah Goldstein", "org": "AbbVie Investor Relations (internal team)", "rel": "Internal recipients, but the data shared exceeds the scope approved by the disclosure committee for external financial communications. IR team may inadvertently incorporate unapproved safety language into earnings call scripts."}, "email": {"from": "gregory.stanton@abbvie.com", "to": "laura.chen@abbvie.com", "date": "Monday, Mar 3, 2026, 4:30 PM", "subject": "Updated safety data for earnings prep", "body": "Laura,\n\nHere's the updated safety data your team requested for the earnings call prep. I pulled the latest signal detection outputs and trend analyses so you have the most current picture.\n\nAttached:\n- Post-market adverse event trend analysis (Skyrizi + Rinvoq, 24-month rolling)\n- Signal detection outputs with proportional reporting ratios\n- Disproportionality analysis (new signals flagged but not yet medically assessed)\n- Comparative safety summary vs. competitor products\n\nNote: Some of these signals haven't been through medical assessment yet, so they're preliminary. But I figured it's better to give you the complete picture so you're not caught off guard if analysts ask about safety trends.\n\nLet me know if you need anything else before the call.\n\nGreg"}, "analysis": "**WHO** -- Pharmacovigilance Signal Detection Lead with no risk factors, responding to a request from IR. His intent is helpful (\"better to give you the complete picture\"), but he bypassed the standard disclosure committee review process that exists specifically to prevent unapproved safety data from influencing external communications. **WHAT** -- Post-market adverse event trend analyses, signal detection outputs, and preliminary disproportionality analyses for two marketed immunology products. The data includes signals that haven't been medically assessed yet, which is dangerous if IR incorporates them into earnings call commentary -- creating both Regulation FD selective disclosure risk and potential FDA concerns about safety signal reporting. **WHO received** -- Internal IR team (not external), but IR's role in preparing earnings call scripts means this data is one step away from public disclosure. The IR team did incorporate the safety language into a draft earnings script that exceeded approved disclosure scope. This is High rather than Critical because: the sharing is internal (no external party received the data yet), the intent is cooperative (responding to a legitimate request), and intervention is possible before the earnings call. However, the regulatory risk (Regulation FD, FDA safety reporting) and the IR team's premature use of the data require immediate notification to the disclosure committee, recall of the draft earnings script, and coaching on PV data governance.", "scores": {"content": 74, "behavior": 70, "context": 78, "overall": 74}, "data_sources": "Safety database audit trail, Email gateway, Disclosure committee records, HR records", "dlp_system": "Purview", "dlp_alerted": "No", "timeline": [{"time": "Monday 11:00 AM", "desc": "IR team requested 'updated safety data' for upcoming earnings call preparation"}, {"time": "Monday 3:00 PM", "desc": "Stanton exported signal detection outputs and disproportionality analyses from safety database"}, {"time": "Monday 4:30 PM", "desc": "Emailed raw PV trend data to three IR team members without disclosure committee review"}, {"time": "Tuesday 9:00 AM", "desc": "IR team incorporated safety language into draft earnings script exceeding approved disclosure scope"}], "tags": ["pharmacovigilance", "investor-relations", "regulation-fd", "earnings-call", "safety-signals", "disclosure-scope"]}, {"n": 211, "title": "Clinical Trial Site Audit Findings Shared with Investigation Site Legal Counsel Instead of Internal Legal", "industry": "pharma", "severity": "high", "sender": {"name": "Karen O'Brien", "role": "Clinical Quality Assurance Auditor", "dept": "R&D", "location": "Wilmington, Delaware", "tenure": "Nov 2017", "risks": ["Former colleague is counsel for the investigation site, prior professional relationship"]}, "recipient": {"name": "Mark Davidson", "org": "University Medical Center (clinical trial investigation site under audit)", "rel": "Former colleague of O'Brien's. Now serves as legal counsel for the investigation site that is the subject of the audit findings. Personal relationship created a conflict that should have been disclosed."}, "email": {"from": "karen.obrien.qa@gmail.com (personal email)", "to": "m.davidson.esq@gmail.com (personal email)", "date": "Wednesday, Mar 5, 2026, 6:30 PM", "subject": "Heads up on the audit", "body": "Mark,\n\nI wanted to give you a heads up before this goes through official channels. The site audit didn't go well, and I'm worried about the impact on your team.\n\nHere's what we found:\n- 3 critical GCP non-compliance observations\n- Data integrity concerns in the eCRF entries for 12 patients\n- Protocol deviation in the dosing schedule that wasn't reported\n- Recommendation to terminate the site's participation in the Phase III trial\n\nI haven't uploaded the report to our QMS yet, so you have some time to get ahead of this. I know you'll handle it professionally, but I thought you deserved to know what's coming.\n\nThe termination recommendation means the 47 patients at your site will need to be transferred to alternative sites, which is going to be complicated.\n\nPlease keep this between us.\n\nKaren"}, "analysis": "**WHO** -- Clinical Quality Assurance Auditor sharing findings with a former colleague who is legal counsel for the audited site. The use of personal email addresses on both sides and the explicit \"I haven't uploaded the report to our QMS yet\" show deliberate circumvention of official channels. Her motivation appears to be personal loyalty rather than financial gain. **WHAT** -- Confidential GCP audit findings including non-compliance observations, data integrity concerns, protocol deviations, and a recommendation to terminate the site from a pivotal Phase III trial. Advance disclosure enables the site to prepare a legal defense, remediate issues before official notification, or potentially destroy evidence. **WHO received** -- Legal counsel for the investigation site under audit, via personal email (bypassing both companies' official channels). This is High rather than Critical because: the intent appears to be personal friendship rather than corruption, the audit findings will eventually be communicated through official channels anyway, and the data is GCP compliance information rather than trade secrets or MNPI. However, the advance warning compromises audit integrity, the failure to file the report in the QMS creates an audit trail gap, and if the findings lead to FDA referral, this could constitute obstruction. Immediate notification to Quality leadership and internal legal required.", "scores": {"content": 73, "behavior": 74, "context": 76, "overall": 74}, "data_sources": "Quality management system, Email gateway, Personal email detection, HR records, Audit tracking database", "dlp_system": "Symantec", "dlp_alerted": "No", "timeline": [{"time": "Wednesday 4:00 PM", "desc": "Completed clinical trial site audit with significant GCP non-compliance findings"}, {"time": "Wednesday 6:30 PM", "desc": "Emailed audit findings from personal Gmail to investigation site counsel's personal email"}, {"time": "Thursday 9:00 AM", "desc": "Did not upload audit report to quality management system as required by SOP"}, {"time": "Friday 2:00 PM", "desc": "Investigation site counsel contacted company legal referencing specific audit findings not yet formally communicated"}], "tags": ["gcp-audit", "clinical-trial", "investigation-site", "legal-breach", "audit-integrity", "quality-assurance", "personal-email"]}, {"n": 212, "title": "Formulary Access Strategy and PBM Rebate Structure Shared with Consultant Without Executed DPA", "industry": "pharma", "severity": "high", "sender": {"name": "Thomas Brennan", "role": "National Account Director", "dept": "Market Access", "location": "Florham Park, New Jersey", "tenure": "Feb 2019", "risks": ["Consultant is former employer (revolving door relationship), no formal vetting completed"]}, "recipient": {"name": "Victoria Simmons", "org": "Apex Market Access Consulting (independent consultant)", "rel": "Former employer of Brennan. No data protection agreement or confidentiality agreement executed. Simmons simultaneously advises two competing pharmaceutical companies on formulary strategy. Not vetted through standard vendor onboarding."}, "email": {"from": "thomas.brennan@abbvie.com", "to": "v.simmons@apexmaconsulting.com", "date": "Monday, Mar 3, 2026, 2:00 PM", "subject": "Formulary materials for your review", "body": "Victoria,\n\nGreat to reconnect at the Market Access Summit. As we discussed, I could really use your perspective on our formulary strategy refresh.\n\nI've set up a shared Dropbox folder with the materials:\nhttps://dropbox.com/sh/formulary-review-2026\n\nContents:\n- Formulary access strategies for 5 therapeutic areas (immunology, oncology, neuroscience, CV, rare disease)\n- PBM rebate rate structures (all major PBMs)\n- Payer negotiation playbooks with contract term templates\n- Competitive positioning summaries\n\nI know we haven't done the formal vendor paperwork yet, but let's not let process slow us down. Your insights from when you were running our payer team are exactly what we need.\n\nCan you turn around initial thoughts by end of week?\n\nThomas"}, "analysis": "**WHO** -- National Account Director engaging a former employer as consultant without going through vendor onboarding, which would have identified the competing client relationships and required DPA execution. His \"let's not let process slow us down\" attitude shows well-intentioned urgency but dangerous disregard for data governance. **WHAT** -- Formulary access strategies for five therapeutic areas, PBM rebate rate structures, and payer negotiation playbooks. These are among the most competitively sensitive materials in pharmaceutical commercial operations. The breadth (five therapeutic areas, not just his assigned portfolio) amplifies the exposure. **WHO received** -- Independent consultant who simultaneously advises two competi 0 physicians)", "org": "International Society of Pharmacovigilance (ISoP) Annual Conference", "rel": "Public scientific audience. Conference presentations become part of the scientific record and cannot be retracted. Four slides were replaced after disclosure review approval."}, "email": {"from": "Slide Tracking + Conference Monitoring Alert", "to": "N/A", "date": "Friday, Mar 7, 2026", "subject": "Alert: Unauthorized slide modifications detected in conference presentation", "body": "**Slide Tracking System + Conference Monitoring Alert**\n\nPresenter: dr.anand.krishnamurthy@abbvie.com\nEvent: ISoP Annual Conference 2026 (Chicago, IL)\nTime: Friday, Mar 7, 2026, 10:00 AM CST\n\n**Disclosure review record:**\n- Monday: 22-slide presentation approved by disclosure review committee\n- Approved slides: General PV methodology, aggregate safety trends (approved data only), regulatory update\n\n**Modification detected:**\n- Thursday 8:00 PM: Slides 14-17 replaced on personal laptop (not synced to corporate slide tracking system)\n- Original slides 14-17: Aggregate safety methodology overview (approved)\n- Replacement slides 14-17: Unauthorized content including:\n  - Unpublished comparative safety analysis vs. competitor product\n  - Post-marketing surveillance data NOT yet submitted to regulatory authorities\n  - Signal detection data explicitly flagged by medical review board as \"not for external presentation\"\n\n**Conference webcast review (post-presentation):**\n- Friday 3:00 PM: Medical affairs team reviewing conference webcast identified four slides not in approved deck\n- Slides are now part of the public scientific record (conference recording + attendee photos)\n\n**Audience impact:**\n- 800 physicians in attendance\n- Conference webcast available to 3,000+ registered attendees\n- Multiple attendee photos of unauthorized slides posted to medical Twitter/X"}, "analysis": "**WHO** -- VP of Pharmacovigilance, a senior executive with deep expertise who should know better than anyone that unapproved safety data cannot be presented publicly. No risk factors suggest this was deliberate professional judgment (wanting to share what he considered important scientific findings) rather than malicious intent. The slide swap on his personal laptop after disclosure review shows intentional circumvention of the approval process. **WHAT** -- Unpublished comparative safety analyses and post-marketing surveillance data not yet submitted to regulatory authorities, presented to 800 physicians at an international conference. The data included signals explicitly flagged as \"not for external presentation.\" Conference presentations become part of the scientific record and cannot be retracted. **WHO received** -- Public scientific audience of 800+ physicians, with conference webcast available to 3,000+ and attendee photos already circulating on social media. This is High rather than Critical because: the data is aggregate safety information (not individual patient data or trade secrets), the intent appears to be scientific sharing rather than competitive sabotage, and the presenter is the VP of PV (the most qualified person to present safety data). However, the regulatory risk is significant: unpublished comparative safety analyses could be interpreted as promotional claims subject to FDA enforcement, and unsubmitted post-marketing data presented publicly could trigger FDA concern about reporting timeliness. Immediate medical affairs and legal notification required.", "scores": {"content": 75, "behavior": 73, "context": 80, "overall": 76}, "data_sources": "Slide tracking system, Disclosure review records, Conference presentation archives, Email gateway, Medical review board minutes", "dlp_system": "Purview", "dlp_alerted": "No", "timeline": [{"time": "Monday", "desc": "Disclosure review committee approved conference presentation with 22 slides"}, {"time": "Thursday 8:00 PM", "desc": "Krishnamurthy replaced slides 14-17 with unauthorized comparative safety analyses on personal laptop"}, {"time": "Friday 10:00 AM", "desc": "Presented modified slides at international conference to audience of 800 physicians"}, {"time": "Friday 3:00 PM", "desc": "Medical affairs team reviewing conference webcast identified four slides not in approved deck"}], "tags": ["conference", "pharmacovigilance", "unapproved-disclosure", "comparative-safety", "fda-risk", "promotional-claims"]}, {"n": 215, "title": "Rare disease patient outcomes data shared with academic collaborator at university medical center without executed DPA", "industry": "pharma", "severity": "high", "sender": {"name": "Dr. Patricia Emeka", "role": "Research Scientist", "dept": "R&D", "location": "Tarrytown, New York", "tenure": "Jan 2021", "risks": ["Active academic collaboration without formal data protection agreement in place"]}, "recipient": {"name": "Dr. James Park", "org": "Johns Hopkins University School of Medicine -- Rare Disease Research Center", "rel": "Academic collaborator working on a joint rare disease research initiative. The collaboration is real and has executive sponsorship, but the data protection agreement (DPA) is still in legal review and has NOT been executed. Dr. Park has legitimate scientific interest in the data."}, "email": {"from": "patricia.emeka@abbvie.com", "to": "jpark@jhmi.edu", "date": "Tuesday, Mar 4, 2026, 3:15 PM EST", "subject": "Outcomes data for the collaborative analysis", "body": "James,\n\nI'm excited to get our collaborative analysis moving. Here are the patient outcomes datasets we discussed at the research planning meeting last month.\n\nAttached:\n- Lysosomal storage disease treatment response data (de-identified, 340 patients)\n- Longitudinal outcomes tracking summary (24-month follow-up)\n- Adverse event frequency tables by treatment arm\n- Patient-reported outcome measures (PRO) aggregate summaries\n\nI know the DPA is still working through legal on both sides, but Dr. Nguyen gave verbal approval to start sharing so we don't lose the publication window. The data is de-identified so I figured it's lower risk.\n\nLet me know when you've had a chance to review. I think we have a strong manuscript here.\n\nPatricia"}, "analysis": "**WHO** -- Research Scientist sharing data with an academic collaborator as part of a real, executive-sponsored research initiative. Her intent is clearly scientific advancement, and she has verbal (but not documented) approval from her supervisor. No financial motivation, no departure signals, no malicious intent. **WHAT** -- De-identified rare disease patient outcomes data including treatment response, longitudinal follow-up, adverse events, and patient-reported outcomes for 340 patients. While de-identified, rare disease populations are small enough that re-identification risk exists. The data has scientific and commercial value (could inform competitor clinical trial design). **WHO received** -- Academic collaborator at Johns Hopkins with a legitimate research relationship and executive-sponsored collaboration, but without an executed data protection agreement. The recipient is a known, reputable researcher at a major institution -- not anonymous and not adversarial. This is HIGH rather than CRITICAL because: the recipient has a real authorized relationship (just missing the formal DPA), the data is de-identified (reducing but not eliminating privacy risk), the intent is legitimate scientific collaboration, and the sharing is recoverable (known recipient at a reputable institution). However, sharing patient outcomes data without an executed DPA violates data governance policy, creates regulatory exposure if re-identification occurs, and bypasses the legal review process. Manager notification required; DPA execution must be expedited.", "scores": {"content": 76, "behavior": 72, "context": 77, "overall": 75}, "data_sources": "Email gateway, Clinical data management system, Legal DPA tracker, HR records, Research collaboration registry", "dlp_system" aterials.\n\nAttached:\n- Hospital formulary decision-making criteria analysis (top 15 health systems)\n- Internal win/loss analysis (Q3-Q4, immunology franchise)\n- Competitive response playbook -- formulary challenges\n- Payer negotiation outcome tracker with contract term benchmarks\n\nThe win/loss analysis is particularly valuable -- it shows exactly where and why we're losing formulary positions to competitors. I think your team needs to see the full picture to give us actionable recommendations.\n\nI know the engagement scope is more limited, but let's not let process slow down good work.\n\nDavid"}, "analysis": "**WHO** -- Regional Account Manager sharing internal competitive intelligence with a consulting firm he has a prior relationship with (former employer). His \"let's not let process slow down good work\" attitude mirrors a common pattern of well-intentioned governance bypass. No financial motivation, no departure signals. **WHAT** -- Hospital formulary decision-making criteria for 15 health systems, internal win/loss analysis revealing exactly where and why the company is losing competitive positions, competitive response playbooks, and payer negotiation outcomes. This is commercially sensitive competitive intelligence that would be highly valuable to competitor pharmaceutical companies. However, it is NOT securities-adjacent MNPI, NOT patient data, and NOT earnings-related. **WHO received** -- Pharmaceutical consulting firm with an active engagement but whose scope does not cover internal win/loss analysis or competitive response playbooks. The consulting firm likely advises competitor pharmaceutical companies as well. This is HIGH rather than CRITICAL because: the recipient has an existing business relationship (active consulting engagement), the data is commercial competitive intelligence (not MNPI or regulated data), and the intent is to improve the engagement's output. However, the consulting firm's likely relationships with competitors means this data could indirectly reach competitive hands, and the scope violation bypasses the review process that exists specifically to prevent over-sharing. Manager notification required; engagement scope review and data recall needed.", "scores": {"content": 78, "behavior": 74, "context": 80, "overall": 77}, "data_sources": "Email gateway, CRM system logs, Vendor management records, HR records", "dlp_system": "Forcepoint", "dlp_alerted": "Yes", "timeline": [{"time": "Last week", "desc": "Formulary strategy engagement kickoff with Clarivate Health Strategy"}, {"time": "Thursday 3:00 PM", "desc": "Downloaded internal win/loss analysis and competitive response playbook from commercial intelligence SharePoint"}, {"time": "Thursday 4:45 PM", "desc": "Emailed win/loss analysis and competitive playbook to consulting firm beyond engagement scope"}, {"time": "Friday 10:00 AM", "desc": "DLP alert triggered; manager notified; engagement scope review initiated"}], "tags": ["consulting-scope", "formulary-strategy", "win-loss-analysis", "competitive-intelligence", "vendor-overshare", "market-access"]}, {"n": 165, "title": "Seismic survey data forwarded to personal email for conference presentation", "industry": "energy", "severity": "medium", "sender": {"name": "Sarah Park", "role": "Senior Geologist", "dept": "Upstream", "location": "Midland, TX", "tenure": "Jan 2020", "risks": ["None. Clean record. Approved to present at SPE conference. Likely used personal email as a shortcut."]}, "recipient": {}, "email": {"from": "sarah.park@chevron.com", "to": "sarahpark.geo@gmail.com", "date": "Monday, Mar 2, 2026, 7:14 PM", "subject": "FW: SPE presentation materials", "body": "Hey self,\n\nForwarding the seismic interpretation slides for my SPE talk next week. I need to work on the presentation over the weekend and my VPN has been flaky at home.\n\nFiles attached:\n- Permian_Basin_Seismic_Interp_Q4.pptx\n- Formation_Boundaries_Map_v3.pdf\n- Well_Correlation_Panel_Subset.xlsx\n\nNote to self: remember to strip the proprietary formation boundary labels before the talk. Jim approved the presentation content but I should double-check which datasets are cleared for external use.\n\n- S"}, "analysis": "**WHO** -- Senior Geologist with a clean record, approved conference presenter, no departure signals. **WHAT** -- Seismic interpretation subsets and formation boundary maps forwarded to personal email. The data includes some proprietary formation markers, but the intent is clearly conference prep, not exfiltration. **WHO received** -- Her own personal Gmail, not a competitor or unknown third party. This is Medium because: the conference presentation was approved by management, the intent is transparent (she even notes she needs to sanitize the data), and the policy violation is the personal email channel, not the sharing itself. Coach on using the company's approved external sharing workflow and the sanitized dataset that removes proprietary formation boundaries. If she had sent the unsanitized data directly to the conference organizers or a competitor, this would escalate to High.", "scores": {"content": 62, "behavior": 50, "context": 52, "overall": 55}, "data_sources": "Microsoft 365, Purview DLP, Manager Verification", "dlp_system": "Purview", "dlp_alerted": "Yes", "timeline": [{"time": "3d ago", "desc": "Purview alert: Seismic data forwarded to personal Gmail"}, {"time": "3d ago", "desc": "AXIA: Engagement sent to Sarah Park requesting context"}, {"time": "3d ago", "desc": "Park response: Preparing approved SPE conference presentation"}, {"time": "3d ago", "desc": "Manager confirmed: Presentation approved, should use sanitized dataset"}, {"time": "3d ago", "desc": "AXIA: Case closed after coaching. Park using approved workflow."}], "tags": ["coaching", "employee-engagement", "seismic-data", "conference"]}, {"n": 166, "title": "Prescriber targeting list forwarded to personal email for field use", "industry": "pharma", "severity": "medium", "sender": {"name": "Sarah Martinez", "role": "Senior Sales Representative, Immunology", "dept": "U.S. Commercial - Immunology", "location": "Dallas, TX", "tenure": "Jan 2023", "risks": ["None. High performer, no departure signals. Veeva CRM mobile app had known connectivity issues in her territory."]}, "recipient": {}, "email": {"from": "sarah.martinez@abbvie.com", "to": "smartinez.work@gmail.com", "date": "Sunday, Mar 1, 2026, 8:42 PM", "subject": "FW: Monday call list + territory data", "body": "Hi me,\n\nSending this so I have it on my phone tomorrow. The Veeva app keeps crashing when I'm in the field and I have back-to-back calls starting at 8am. Can't afford to be standing in a parking lot waiting for it to load again.\n\nAttached:\n- Skyrizi_Prescriber_Targets_SW_Territory.xlsx (120 physicians, NPI numbers, prescribing volumes, call history)\n- Monday_Route_Plan.pdf\n\nI'll delete this after my calls. Just need a reliable backup for the day.\n\n- Sarah"}, "analysis": "**WHO** -- Senior sales rep, high performer, no risk factors. The Veeva CRM mobile connectivity issue is a known IT problem in her territory, lending credibility to her explanation. **WHAT** -- Prescriber targeting list with physician names, NPI numbers, prescribing volumes, and call history for 120 healthcare providers. Contains DEA-adjacent regulated data. **WHO received** -- Her own personal Gmail for field use the next day. This is Medium because: the intent is operational (she needs the data for scheduled calls), the CRM connectivity issue is verifiable, and she explicitly mentions deleting it afterward. However, transferring prescriber data with NPI numbers to an unmanaged personal account violates PDMA data handling requirements and removes the data from corporate governance controls. Coach on using Veeva CRM's offline mode and report the connectivity issue to IT for resolution.", "scores": {"content": 60, "behavior": 50, "context": 52, "overall": 55}, "data_sources": "Microsoft 365, Purview DLP, Manager Veri ons]"}, "analysis": "**WHO** -- Refinery Operations Supervisor and union liaison, 10-year tenure, motivated by worker safety advocacy. His intent was to keep union representatives informed for upcoming safety committee discussions. **WHAT** -- Confidential safety incident investigation report with witness statements, individual employee actions, and preliminary corrective action recommendations. The report is legally privileged during the active investigation phase. **WHO received** -- 47 union stewards across multiple facilities via the all-facilities mailing list, rather than the single-site safety committee (5-7 people) that was the appropriate audience. This is Medium because: the intent is worker safety advocacy (clearly legitimate), Trevor is acting in his union liaison capacity, and the recipients are internal employees with safety responsibilities. However, unredacted witness statements and individual performance assessments in a broadly distributed report may compromise the investigation's integrity, expose the company to labor relations complications, and chill future safety reporting. Coach on the difference between the site safety committee list and the all-facilities steward list, and on sharing anonymized summaries rather than unredacted investigation reports during active investigations.", "scores": {"content": 60, "behavior": 52, "context": 65, "overall": 59}, "data_sources": "Email gateway, distribution list membership, document classification tags", "dlp_system": "Symantec", "dlp_alerted": "Yes", "timeline": [{"time": "07:45", "desc": "Trevor received the investigation report from the incident commander"}, {"time": "08:10", "desc": "Trevor forwarded the report to the union stewards mailing list (47 recipients)"}, {"time": "08:11", "desc": "Symantec flagged email with Confidential-tagged attachment sent to broad distribution"}, {"time": "08:55", "desc": "Site safety director contacted Trevor about the unauthorized distribution"}], "tags": ["safety-investigation", "wrong-distribution", "union", "internal-oversharing", "energy", "medium"]}, {"n": 220, "title": "Exploration Budget Shared Beyond Authorized JV Scope", "industry": "energy", "severity": "medium", "sender": {"name": "Priya Venkataraman", "role": "Joint Venture Coordinator", "dept": "Upstream", "location": "Houston, Texas", "tenure": "Aug 2020", "risks": ["None. Consolidated multiple blocks into one spreadsheet for convenience without checking JV scope boundaries."]}, "recipient": {"name": "Anders Eriksson", "org": "Equinor (joint venture partner)", "rel": "Active JV partner for Blocks 14 and 22. NOT a partner on Block 31, which is wholly owned and under active farmout negotiations with a competing consortium."}, "email": {"from": "priya.venkataraman@chevron.com", "to": "anders.eriksson@equinor.com", "date": "Tuesday, Mar 3, 2026, 10:25 AM", "subject": "Exploration budgets for Q2 coordination meeting", "body": "Hi Anders,\n\nHere are the exploration budget allocations ahead of our quarterly coordination meeting next week. I consolidated the numbers into one spreadsheet so it's easier to review.\n\nThe file covers Blocks 14, 22, and 31 with the full breakdown by activity category (seismic acquisition, drilling, geological studies, environmental). Let me know if you need any additional detail for your team's planning.\n\nLooking forward to the meeting.\n\nBest,\nPriya\n\n[Attached: Q2_Exploration_Budget_Consolidated.xlsx -- includes budget allocations for Blocks 14, 22, and 31]"}, "analysis": "**WHO** -- JV Coordinator, no risk factors, acting in her normal role preparing for a routine coordination meeting. The error was consolidating three blocks into one file without checking which were in the JV scope. **WHAT** -- Exploration budget allocations for three offshore blocks, including one (Block 31) that is wholly owned and under active farmout negotiations. The Block 31 data reveals the company's investment priorities and valuation assumptions for a prospect being negotiated with a competing consortium. **WHO received** -- Equinor, a legitimate JV partner for two of the three blocks, with an active information-sharing agreement. However, they are not entitled to Block 31 data, and Equinor may also be evaluating competing opportunities in the same area. This is Medium because: the intent was efficient meeting preparation (not malicious), two of the three blocks were appropriately shared, and the recipient is a trusted JV partner with an existing NDA. However, the Block 31 budget data could influence farmout negotiations or be shared within Equinor with teams working on competing bids. Coach on JV data compartmentalization practices and the importance of block-by-block scope verification before external sharing.", "scores": {"content": 68, "behavior": 50, "context": 62, "overall": 60}, "data_sources": "Email gateway, JV data room access logs, SharePoint audit trail", "dlp_system": "Forcepoint", "dlp_alerted": "Yes", "timeline": [{"time": "10:00", "desc": "Priya compiled exploration budgets from three blocks into a single Excel file"}, {"time": "10:25", "desc": "Priya emailed the consolidated spreadsheet to the JV partner representative"}, {"time": "10:26", "desc": "Forcepoint flagged outbound file containing data tagged to non-JV asset"}, {"time": "11:15", "desc": "JV governance manager contacted Priya to review the scope of the shared data"}], "tags": ["joint-venture", "scope-violation", "exploration-budget", "external-sharing", "energy", "medium"]}, {"n": 221, "title": "Fleet GPS Data Accessed Outside Authorized Territory", "industry": "energy", "severity": "medium", "sender": {"name": "Daryl Hutchins", "role": "Regional Fleet Manager", "dept": "Supply & Trading", "location": "Oklahoma City, Oklahoma", "tenure": "Nov 2016", "risks": ["Recently passed over for promotion to national fleet director. Stated he was benchmarking his region's performance against peers."]}, "recipient": {}, "email": {}, "analysis": "**WHO* der": {"name": "Sung-Ho Park", "role": "Process Integration Engineer", "dept": "Refining", "location": "Deer Park, Texas", "tenure": "Feb 2021", "risks": ["None. Working on a post-acquisition integration project. Assumed the Slack channel was internal-only."]}, "recipient": {}, "email": {"from": "", "to": "", "date": "Thursday, Mar 5, 2026, 11:30 AM", "subject": "", "body": "**Source:** Slack message in #refinery-integration channel\n**Channel members:** 28 internal + 4 external integration consultants (two also work with competitor refinery)\n**Date:** Thursday, Mar 5, 2026, 11:30 AM\n\n[Slack message posted by Sung-Ho Park in #refinery-integration]\n\n@channel Hey team, uploading the yield optimization parameters for the Deer Park unit so everyone has the latest numbers for the integration model.\n\nKey data points:\n- Cat cracker yield: 48.2% gasoline, 22.1% LCO, 8.4% bottoms (optimized Q4 catalyst blend)\n- Coker throughput: 42,000 bpd at 94.3% utilization\n- Optimal crude slate: 65% WTI Midland / 20% Mars / 15% Maya (current blending sweet spot)\n- Hydrogen consumption: 1,150 scf/bbl on the hydrocracker\n- Catalyst performance curve attached (proprietary - 18 months of tuning data)\n\nLet me know if anyone needs the feedstock quality specs too.\n\n[Attached: DeerPark_YieldOpt_Q1_2026.xlsx]"}, "analysis": "**WHO** -- Process Integration Engineer, no risk factors, working on a legitimate post-acquisition integration project. He assumed the Slack channel was internal-only and did not check the membership list for external participants. **WHAT** -- Refinery yield optimization parameters including catalyst performance data, crude slate configurations, and throughput metrics. This data represents years of operational tuning and is classified as Restricted. **WHO received** -- A Slack channel with 28 internal employees (appropriate) and 4 external integration consultants, two of whom also work with a competitor refinery (inappropriate). This is Medium because: the intent was collaborative project work (not malicious), the channel was set up for the integration project, and Sung-Ho had no reason to suspect external participants. However, catalyst performance curves and blending ratios directly impact refining margins and are closely guarded competitive intelligence. The two consultants with competitor engagements create a clear vector for competitive leakage. Coach on verifying channel membership before posting Restricted content, and review the channel's external access configuration.", "scores": {"content": 68, "behavior": 55, "context": 62, "overall": 62}, "data_sources": "Slack message logs, channel membership audit, external consultant engagement records", "dlp_system": "Purview", "dlp_alerted": "Yes", "timeline": [{"time": "11:30", "desc": "Sung-Ho posted yield optimization spreadsheet to #refinery-integration Slack channel"}, {"time": "11:31", "desc": "Purview flagged Restricted-classified content in channel with external members"}, {"time": "11:45", "desc": "Integration project manager reviewed channel membership and identified two consultants with competitor engagements"}, {"time": "12:15", "desc": "IT security revoked external access to the channel and initiated message retention hold"}], "tags": ["slack", "external-consultants", "refinery-data", "wrong-channel", "integration-project", "energy", "medium"]}, {"n": 223, "title": "Pipeline Inspection Drone Footage Uploaded to Personal YouTube", "industry": "energy", "severity": "high", "sender": {"name": "Kyle Braddock", "role": "Pipeline Integrity Technician", "dept": "Pipeline Operations", "location": "Cushing, Oklahoma", "tenure": "Apr 2018", "risks": ["Active personal drone enthusiast YouTube channel (2,400 subscribers). Proud of his professional drone work."]}, "recipient": {}, "email": {}, "analysis": "**WHO** -- Pipeline Integrity Technician, drone enthusiast, no departure signals or malicious intent. Genuinely proud of his professional skills and wanted to showcase them on his hobby channel. **WHAT** -- Drone inspection footage containing identifiable critical infrastructure: valve station locations (VS-147), pump facility coordinates visible on the drone's HUD overlay, pipeline route segments, and metering station facility IDs. Pipeline infrastructure location data is classified as Critical Infrastructure Information (CII) under TSA Pipeline Security Directives. The 12-minute video provides a complete reconnaissance package of the pipeline's physical security profile. **WHO received** -- Public YouTube audience (2,400 subscribers plus anyone who finds the video). This is High because: the data falls under federal TSA Pipeline Security Directives governing Critical Infrastructure Information, creating potential regulatory violation with enforcement consequences beyond simple policy breach. The exposure is permanent and public — the video was indexed by YouTube and viewable by any party including adversarial actors. Valve station coordinates, pump facility locations, and pipeline routes enable physical security threat mapping. While Kyle had no malicious intent, the irreversibility (public posting), regulatory classification of the data (CII under federal directives), and physical safety implications elevate this beyond coaching-level MEDIUM. Initiate immediate YouTube takedown, engage pipeline security and legal for TSA notification assessment, and coach Kyle on CII classification requirements.", "scores": {"content": 75, "behavior": 62, "context": 78, "overall": 72}, "data_sources": "Social media monitoring, YouTube content scan, drone operations log", "dlp_system": "Netskope", "dlp_alerted": "No", "timeline": [{"time": "Field day 14:00", "desc": "Kyle captured drone footage during routine pipeline inspection"}, {"time": "Evening 19:30", "desc": "Kyle edited and uploaded footage to personal YouTube channel"}, {"time": "Next day 09:00", "desc": "Social media monitoring tool flagged video containing company facility imagery"}, {"time": "Next day 10:15", "desc": "Pipeline security team reviewed footage and initiated takedown request"}], "tags": ["social-media", "drone-footage", "critical-infrastructure", "youtube", "pipeline-security", "energy", "high", "TSA-CII", "public-disclosure"]}, {"n": 224, "title": "Well Completion Cost Data Used in Personal Consulting Side Project", "industry": "energy", "severity": "medium", "sender": {"name": "Natalie Ferreira", "role": "Completions Engineer", "dept": "Upstream", "location": "Midland, Texas", "tenure": "Sep 2015", "risks": ["Registered LLC for engineering consulting (approved side employment by HR). Side employment approval did not authorize use of company proprietary data."]}, "recipient": {}, "email": {}, "analysis": "**WHO** -- Completions Engineer, 10-year tenure, approved side employment through HR. The side consulting LLC was disclosed and approved, but the approval did not authorize use of company proprietary data. Natalie likely assumed that her general familiarity with the data was acceptable to leverage. **WHAT** -- Well completion cost data for 45 wells across three basins, including detailed cost breakdowns for fracturing stages, casing programs, and vendor pricing. This data reveals operational efficiency, vendor relationships, and the company's cost structure. **WHO received** -- No external sharing detected yet. The data was exported to a local Excel file, likely for incorporation into a consulting deliverable for an independent operator client. This is Medium because: the side employment was properly disclosed, no data has been shared externally yet, and the conflict-of-interest appears to stem from a misunderstanding of the IP boundaries rather than deliberate theft. However, using proprietary cost data to benefit a competing operator through a side business is a direct conflict of interest and may violate the IP assignment clause in Natalie's employment agreement. Coach on the distinction between personal expertise (shareable) and company proprietary data (not shareable), review the side employment agreement scope, and confirm no external sharing has occurred.", "scores": {"content": 65, "behavior": 60, "context": 68, "overall": 64}, "data_sources": "Database access logs, data export audit trail, HR side employment records, endpoint monitoring", "dlp_system": "Forcepoint", "dlp_alerted": "Yes", "timeline": [{"time": "Week 1", "desc": "Natalie queried completion cost database for 45 wells across three basins"}, {"time": "Week 1 Thursday evening", "desc": "Natalie exported consolidated cost data to local Excel file"}, {"time": "Week 2", "desc": "Forcepoint flagged bulk data export pattern outside normal working hours"}, {"time": "Week 2 Wednesday", "desc": "Manager and HR reviewed side employment agreement scope against data access"}], "tags": ["side-employment", "conflict-of-interest", "data-export", "completion-costs", "consulting", "energy", "medium"]}, {"n": 225, "title": "Near-Miss Reports Shared with Contractor Team Without Anonymization", "industry": "energy", "severity": "medium", "sender": {"name": "Carmen Reyes", "role": "HSE Coordinator", "dept": "HSE", "location": "Baytown, Texas", "tenure": "Jul 2020", "risks": ["None. Enthusiastic about the joint safety improvement initiative and wanted to provide thorough data."]}, "recipient": {"name": "Contractor Safety Team (3 contracting companies)", "org": "BakerCorp, Jacobs Engineering, Turner Industries", "rel": "Active contractor partners working across multiple operator sites in the Gulf Coast region. Joint safety initiative is authorized."}, "email": {"from": "carmen.reyes@chevron.com", "to": "safety-team@bakercorp.com; j.wilson@jacobs.com; safety@turnerindustries.com", "date": "Monday, Mar 2, 2026, 9:20 AM", "subject": "Near-miss data for joint safety initiative", "body": "Hi all,\n\nGreat kickoff meeting last week! As promised, here are the near-miss reports from the past 12 months to support our joint safety improvement analysis.\n\nI've included 23 reports covering the most relevant incident types we discussed. Each report has the full details so your teams can do a proper root cause pattern analysis.\n\nA few that I think are particularly relevant:\n- NM-2025-089: J. Rodriguez (Badge #4417), Unit 5 scaffold near-fall. Supervisor noted fatigue as contributing factor.\n- NM-2025-112: K. Pham (Badge #3892), chemical splash during transfer. PPE compliance gap identified.\n- NM-2026-003: M. Torres (Badge #5501), forklift near-miss in loading dock. Supervisor assessment: \"inadequate training on new equipment.\"\n\nLet me know if you need the full incident investigation reports too.\n\nBest,\nCarmen\n\n[Attached: NearMiss_Reports_2025-2026_Full.zip -- 23 reports with employee names, badge numbers, supervisor assessments]"}, "analysis": "**WHO** -- HSE Coordinator, no risk factors, genuinely invested in the joint safety improvement initiative. Her enthusiasm for providing thorough data led her to skip the anonymization step. **WHAT** -- 23 near-miss incident reports containing full employee names, badge numbers, specific unit locations, and supervisor assessments of contributing factors including personal performance commentary. **WHO received** -- Three contractor safety teams who work across multiple operator sites in the region, meaning the employee PII and supervisor assessments could be seen by personnel who also work for competing operators. This is Medium because: the joint safety initiative was authorized, Carmen's intent was collaborative safety improvement, and the recipient companies are legitimate contractor partners. However, sharing unredacted reports with full employee identities and supervisor commentary violates the company's safety reporting confidentiality policy and could chill future voluntary near-miss reporting if employees learn their identities were shared externally. Coach on the anonymization protocol, recall the unredacted reports, and provide properly redacted summaries instead.", "scores": {"content": 55, "behavior": 50, "context": 60, "overall": 55}, "data_sources": "Email gateway, safety management system export logs, contractor portal access records", "dlp_system": "Symantec", "dlp_alerted": "Yes", "timeline": [{"time": "09:00", "desc": "Carmen exported 23 near-miss reports from the safety management system"}, {"time": "09:20", "desc": "Carmen emailed unredacted reports to contractor safety team distribution list"}, {"time": "09:21", "desc": "Symantec flagged outbound email with PII indicators to external domain"}, {"time": "10:00", "desc": "HSE director reviewed the flagged transmission and identified anonymization gap"}], "tags": ["safety-reporting", "pii", "anonymization-failure", "contractor-sharing", "near-miss", "energy", "medium"]}, {"n": 226, "title": "Formulary Strategy Slides Uploaded to Personal OneDrive for Conference Prep", "industry": "pharma", "severity": "medium", "sender": {"name": "Priya Dasgupta", "role": "Senior Manager, Market Access", "dept": "Commercial", "location": "Mettawa, Illinois", "tenure": "Sep 2020", "risks": ["None. Preparing for an upcoming payer advisory board and wanted to review slides on her personal tablet during her commute."]}, "recipient": {"name": "Priya Dasgupta (personal)", "org": "Personal Microsoft OneDrive account", "rel": "Self — personal cloud storage with no business authorization or IT oversight. No organizational DLP coverage on personal OneDrive."}, "email": {"from": "priya.dasgupta@abbvie.com", "to": "priya.dasgupta@outlook.com", "date": "Monday, Mar 2, 2026, 6:15 PM CST", "subject": "Slides for Thursday", "body": "Hi — just sending these to myself so I can review on the train tomorrow morning.\n\nAttached:\n- ABBV_Formulary_Strategy_2026_Q1_Update.pptx\n- Payer_Advisory_Board_Discussion_Guide_DRAFT.pdf\n\nThe strategy deck has the updated tier positioning for RINVOQ and SKYRIZI across the top 15 PBMs, including our proposed rebate ranges and the competitive parity analysis vs. Lilly and J&J. I want to make sure I'm ready for the advisory board panelists' questions.\n\nThe discussion guide has the moderator prompts and the three scenarios we want the payers to react to — including the one where we model what happens if Express Scripts moves us to non-preferred.\n\nThanks,\nPriya"}, "analysis": "**WHO** — Senior Manager in Market Access, no behavioral risk factors, no departure signals, no grievance. She is preparing for a legitimate upcoming payer advisory board and wanted to review materials during her commute. **WHAT** — Formulary strategy slides containing tier positioning across 15 PBMs, proposed rebate ranges, competitive parity analysis versus named competitors, and a payer advisory board discussion guide with scenario modeling. This is commercially sensitive (rebate ranges and competitive positioning) but is not MNPI, not regulated PII, and does not carry securities implications. Formulary strategy is operational commercial intelligence, not material to stock price. **WHO received** — Herself, via personal OneDrive. The data has not left her control, but it now resides on an unsanctioned personal cloud service outside IT management and DLP coverage. No external adversary received the data. This is Medium because the root cause is convenience-driven policy violation (using personal cloud for work files), the recipient is the sender herself, and the data — while commercially sensitive — is not regulated or market-moving. Coaching on approved remote access methods (corporate VPN, managed devices, approved file sharing) will address the behavior. No malice, no external exposure, no concealment.", "scores": {"content": 58, "behavior": 50, "context": 55, "overall": 54}, "data_sources": "- Email gateway (outbound to personal domain)\n- Microsoft 365 activity logs\n- Corporate device management system", "dlp_system": "Purview", "dlp_alerted": "Yes — outbound email to personal domain containing file classified as \"Commercial Confidential\"", "timeline": [], "tags": ["personal-cloud", "unsanctioned-tools", "formulary-strategy", "commercial-data", "convenience-sharing", "pharma", "medium"]}, {"n": 227, "title": "Carbon Offset Methodology Sent to Auditor Before Governance Review", "industry": "energy", "severity": "medium", "sender": {"name": "Joanna Lindqvist", "role": "Carbon Markets Analyst", "dept": "New Energies", "location": "Houston, Texas", "tenure": "May 2021", "risks": ["None. Eager to advance the auditor engagement and did not realize the governance review was a prerequisite for external sharing."]}, "recipient": {"name": "Graham Fletcher", "org": "Verra Standards (third-party environmental auditor)", "rel": "Authorized auditor engagement under general services agreement. Compound-specific DPA for IP-sensitive methodology documents has not been executed."}, "email": {"from": "joanna.lindqvist@chevron.com", "to": "g.fletcher@verra.org", "date": "Wednesday, Mar 4, 2026, 10:30 AM", "subject": "Carbon offset verification methodology - for your review", "body": "Hi Graham,\n\nI know we're a few weeks ahead of the formal review timeline, but I wanted to get your team started on the methodology assessment so we're not rushing at the end. The board ESG committee review is scheduled for late March, but I don't think the final version will change materially.\n\nAttached is our proprietary carbon offset verification methodology for nature-based credits. It includes the novel quantification approaches we've been developing for reforestation and wetland restoration projects. We're planning to commercialize this as a licensed verification standard, so we're particularly interested in your feedback on the scientific rigor of Section 3 (the biomass carbon sequestration model).\n\nThe general engagement NDA should cover this, but let me know if your team needs anything else.\n\nThanks,\nJoanna\n\n[Attached: Chevron_Carbon_Offset_Methodology_v2.3_DRAFT.pdf -- 85 pages, proprietary quantification approaches for nature-based carbon credits]"}, "analysis": "**WHO** -- Carbon Markets Analyst, no risk factors, trying to be proactive by getting the auditor started early. She genuinely did not understand that the board governance review was a prerequisite for external sharing, not just an internal formality. **WHAT** -- Proprietary carbon offset verification methodology containing novel quantification approaches that the company plans to commercialize as a licensed verification standard. The document represents a potential new revenue stream through IP licensing. **WHO received** -- Verra Standards, an authorized third-party auditor with a general engagement NDA. However, the general NDA does not include the specific IP assignment provisions required for pre-commercialization methodology documents. This is Medium because: the auditor engagement is authorized, the relationship is legitimate, and Joanna's intent was to accelerate the review timeline (not to leak IP). However, sharing the methodology before IP protections are in place risks losing trade secret status and may allow the auditor's network to adopt the approach without a licensing arrangement. The board governance step exists specifically to ensure IP and commercialization strategies are aligned before external disclosure. Coach on the staged external release process and the importance of completing the board ESG review and IP filing before any external sharing.", "scores": {"content": 60, "behavior": 50, "context": 62, "overall": 57}, "data_sources": "Email gateway, board governance workflow tracker, document version control", "dlp_system": "Forcepoint", "dlp_alerted": "Yes", "timeline": [{"time": "10:00", "desc": "Joanna downloaded the draft carbon offset methodology from the governance review SharePoint"}, {"time": "10:30", "desc": "Joanna emailed the methodology to the third-party auditor with a general engagement NDA reference"}, {"time": "10:31", "desc": "Forcepoint flagged outbound document tagged as Board Review Pending"}, {"time": "11:45", "desc": "New Energies VP contacted Joanna after receiving the DLP alert"}], "tags": ["carbon-offsets", "ip-protection", "premature-sharing", "governance-bypass", "auditor", "energy", "medium"]}, {"n": 228, "title": "Subsurface Mapping Data in PhD Thesis Without Sanitization", "industry": "energy", "severity": "medium", "sender": {"name": "Dr. Tomoko Hayashi", "role": "Senior Geophysicist", "dept": "Upstream", "location": "Houston, Texas", "tenure": "Aug 2013", "risks": ["Part-time PhD program (approved educational leave). Thesis uses novel seismic interpretation techniques developed during her company work."]}, "recipient": {}, "email": {}, "analysis": "**WHO** -- Senior Geophysicist, 12-year tenure, on approved educational leave. Her thesis work genuinely advances seismic interpretation science and she credited the company in her acknowledgments. She believed her general permission to use field data covered publication without the formal sanitization review. **WHAT** -- Subsurface formation mapping data for three active exploration blocks, including real well log correlations, formation depth markers, and structural contour maps with identifiable block references. This data is among the most competitively sensitive in the upstream sector. **WHO received** -- Public university digital repository, permanently accessible. Competitors can use formation mapping and well log correlations to evaluate adjacent acreage prospectivity and reduce their own exploration risk. This is Medium because: the educational program was approved, the thesis makes genuine scientific contributions, and Tomoko acted in good faith believing she had sufficient authorization. However, the company's educational support policy requires formal sanitization review by the geoscience data management team before publication, which she skipped. Coach on the data sanitization requirement, coordinate with the university on whether the thesis can be revised to use anonymized data, and review the educational leave policy communication to prevent recurrence.", "scores": {"content": 65, "behavior": 55, "context": 68, "overall": 63}, "data_sources": "University digital repository monitoring, educational leave program records, geoscience database access logs", "dlp_system": "Symantec", "dlp_alerted": "No", "timeline": [{"time": "3 months prior", "desc": "Tomoko began drafting thesis chapters using company subsurface data"}, {"time": "1 month prior", "desc": "Tomoko submitted thesis to university committee without data sanitization review"}, {"time": "Submission day", "desc": "University published thesis to digital repository"}, {"time": "1 week later", "desc": "Geoscience data manager discovered the publication during routine academic monitoring"}], "tags": ["academic-use", "data-sanitization", "subsurface-data", "thesis", "university-publication", "energy", "medium"]}, {"n": 229, "title": "Physician Sample Requests Forwarded to Personal Email", "industry": "pharma", "severity": "medium", "sender": {"name": "Derek Sandoval", "role": "Territory Sales Representative", "dept": "Commercial", "location": "Phoenix, Arizona", "tenure": "Mar 2019", "risks": ["None. Wanted to build a better performance tracking tool than what the company provides."]}, "recipient": {}, "email": {"from": "derek.sandoval@abbvie.com", "to": "derek.sandoval.work@gmail.com", "date": "Friday, Feb 28, 2026, 4:45 PM", "subject": "FW: Territory data for weekend analysis", "body": "Quick forward so I can work on my territory dashboard this weekend. The Veeva reports are fine but I want to build something in Google Sheets that actually shows me which docs are trending up vs down.\n\nAttached:\n- SW_Territory_Prescriber_Data_Q1.xlsx\n  - 120 physicians: names, NPI numbers, DEA numbers, Skyrizi/Rinvoq prescribing volumes\n  - Call history (last 6 months)\n  - Sample request patterns with quantities\n  - Insurance mix by physician\n\nI'll delete this after I'm done with the dashboard. Just need it for the weekend.\n\n- D"}, "analysis": "**WHO** -- Territory Sales Representative, no risk factors, motivated by wanting better performance analytics than the standard CRM reports. The \"I'll delete it after\" comment shows awareness that this isn't ideal, but he proceeded anyway for convenience. **WHAT** -- Prescriber data with physician names, NPI numbers, DEA numbers, prescribing volumes, sample request patterns, and insurance mix for 120 healthcare providers. DEA numbers are subject to DEA regulations and PDMA requirements. **WHO received** -- His own personal Gmail for a weekend analytics project. This is Medium because: the intent is performance improvement (clearly benign), the data stays with the employee, and the weekend project shows initiative. However, transferring physician data containing DEA numbers to an unmanaged personal email account removes it from corporate data governance controls, violates PDMA data handling requirements, and creates compliance exposure if the personal account is compromised. Coach on using the company's approved analytics tools or requesting IT support for a custom dashboard within the corporate environment.", "scores": {"content": 62, "behavior": 58, "context": 60, "overall": 60}, "data_sources": "Email gateway, CRM export audit trail, personal email domain detection", "dlp_system": "Purview", "dlp_alerted": "Yes", "timeline": [{"time": "16:30", "desc": "Derek exported territory performance data from CRM to Excel"}, {"time": "16:45", "desc": "Derek forwarded the Excel file to his personal Gmail address"}, {"time": "16:46", "desc": "Purview flagged outbound email with DEA numbers to external personal domain"}, {"time": "Next day 08:00", "desc": "Commercial compliance team reviewed the DLP alert"}], "tags": ["personal-email", "dea-numbers", "physician-data", "crm-export", "pdma", "pharma", "medium"]}, {"n": 230, "title": "Formulary Rejection Feedback Discussed in LinkedIn Post", "industry": "pharma", "severity": "medium", "sender": {"name": "Alicia Brennan", "role": "Senior Market Access Manager", "dept": "Market Access", "location": "Kenilworth, New Jersey", "tenure": "Oct 2017", "risks": ["Active LinkedIn thought leader (15K followers). Strong professional brand in market access space."]}, "recipient": {}, "email": {}, "analysis": "**WHO** -- Senior Market Access Manager, well-established LinkedIn thought leader, no risk factors. Her intent was professional reputation-building and industry community engagement. She framed the post as general industry commentary. **WHAT** -- Specific payer feedback from three named PBMs including rejection rationales, cost-effectiveness thresholds ($150K/QALY), and the company's planned response strategies (RWE package, rebate renegotiation, head-to-head study). All of this is commercially sensitive negotiation intelligence. **WHO received** -- Public LinkedIn audience (15K followers), including industry analysts who amplified the post before it was flagged. This is Medium because: the intent was thought leadership (not competitive sabotage), Alicia's professional engagement is generally valued by the company, and some degree of industry commentary is expected at her level. However, naming specific PBMs, citing their rejection thresholds, and disclosing the company's counter-strategy publicly undermines ongoing payer negotiations with PBMs who have not yet made formulary decisions, and may violate confidentiality provisions in payer contracts. Coach on the line between general industry commentary and specific commercial intelligence, and establish a pre-publication review process for social media posts touching on payer relationships.", "scores": {"content": 65, "behavior": 55, "context": 62, "overall": 61}, "data_sources": "Social media monitoring, LinkedIn content analysis, market access strategy documents", "dlp_system": "Netskope", "dlp_alerted": "No", "timeline": [{"time": "12:00", "desc": "Alicia drafted and published LinkedIn post on formulary access challenges"}, {"time": "14:30", "desc": "Post received 200+ reactions and was shared by two industry analysts"}, {"time": "15:00", "desc": "Social media monitoring flagged post containing payer-specific commercial details"}, {"time": "15:45", "desc": "Market Access VP contacted Alicia to discuss the post's content"}], "tags": ["social-media", "linkedin", "payer-intelligence", "formulary", "market-access", "pharma", "medium"]}, {"n": 231, "title": "Internal Training Slides with Patient Demographic Summary Sent to Wrong Distribution List", "industry": "pharma", "severity": "medium", "sender": {"name": "Dr. Kenji Watanabe", "role": "Medical Science Liaison", "dept": "Medical Affairs", "location": "San Francisco, California", "tenure": "Mar 2019", "risks": ["None. Was rushing to distribute training materials before a Monday field team meeting and selected the wrong Outlook distribution list."]}, "recipient": {"name": "US-Commercial-All (distribution list)", "org": "AbbVie internal — 340 members across Sales, Marketing, Market Access, and Commercial Operations", "rel": "Internal employees with legitimate access to commercial materials, but not authorized to receive unblinded patient demographic breakdowns from Medical Affairs training decks. Medical Affairs materials with patient-level summaries are restricted to the MSL team and Medical Affairs leadership."}, "email": {"from": "kenji.watanabe@abbvie.com", "to": "US-Commercial-All@abbvie.com", "date": "Friday, Feb 27, 2026, 5:48 PM PST", "subject": "SKYRIZI real-world evidence training — please review before Monday", "body": "Hi team,\n\nAttached are the updated training slides for Monday's session on real-world evidence in dermatology. Please review before the meeting so we can focus discussion time on the case studies.\n\nAttached:\n- SKYRIZI_RWE_Training_2026Q1.pptx (42 slides)\n\nSlides 14-18 contain the patient demographic summary from the post-marketing registry — age distributions,
