 "overall": 55}, "data_sources": "- Email gateway (internal distribution list expansion)\n- Outlook distribution list membership records\n- Medical Affairs data classification registry", "dlp_system": "Purview", "dlp_alerted": "Yes — email containing \"patient demographic\" keywords sent to distribution list exceeding 50 recipients", "timeline": [], "tags": ["wrong-distribution-list", "misdirection", "patient-data", "medical-affairs", "internal-boundary", "small-cohort", "pharma", "medium"]}, {"n": 232, "title": "Drug Interaction Database Queries Shared Without Executed DPA", "industry": "pharma", "severity": "medium", "sender": {"name": "Dr. Megan Callister", "role": "Clinical Pharmacologist", "dept": "R&D", "location": "North Chicago, Illinois", "tenure": "Apr 2018", "risks": ["None. Long-standing academic collaboration. Assumed the master services agreement covered compound-specific data sharing."]}, "recipient": {"name": "Prof. David Chen", "org": "Johns Hopkins University School of Medicine", "rel": "Active academic collaborator under master services agreement. The compound-specific data protection addendum (DPA) required for pipeline compound data has not been executed."}, "email": {"from": "megan.callister@abbvie.com", "to": "dchen@jhmi.edu", "date": "Tuesday, Mar 3, 2026, 9:45 AM", "subject": "DDI data for our collaboration paper", "body": "Hi David,\n\nHere are the drug-drug interaction query results we discussed for the co-authored paper. I pulled the data for three of our pipeline compounds so we can do a comprehensive CYP450 analysis.\n\nAttached:\n- ABBV-4721_DDI_Profile.xlsx (CYP3A4 inhibition curves, metabolic pathway analysis)\n- ABBV-5833_DDI_Profile.xlsx (CYP2D6 interaction data, including the unexpected inhibition we found)\n- ABBV-6102_DDI_Profile.xlsx (Full CYP450 panel results, protein binding data)\n\nThe ABBV-5833 data is particularly interesting for our paper since the CYP2D6 finding could change the dosing strategy. I've included the raw assay data so your team can run their own analysis.\n\nLet me know when you're ready to start drafting the methods section.\n\nBest,\nMegan"}, "analysis": "**WHO** -- Clinical Pharmacologist, no risk factors, working on a legitimate co-authored paper with a long-standing academic collaborator. She assumed the existing master services agreement was sufficient for this data transfer. **WHAT** -- Drug-drug interaction profiles for three pipeline compounds, including CYP450 inhibition data, metabolic pathway analysis, and raw assay data. This reveals the company's understanding of safety signals and potential label limitations before regulatory submission. **WHO received** -- Johns Hopkins professor, legitimate academic collaborator under a master services agreement. However, the compound-specific DPA required for sharing preclinical pipeline data has not been executed, leaving the data without adequate contractual IP protection. This is Medium because: the academic collaboration is legitimate and valued, the master agreement exists, and Megan's intent is advancing shared scientific work. However, without the compound-specific DPA, there are no contractual restrictions on the university's publication, further sharing, or use of the compound-specific interaction data. The CYP2D6 finding she mentions could be material to regulatory strategy. Coach on the difference between master agreements and compound-specific DPAs, pause data sharing until legal executes the addendum, and review what has already been shared with the collaborator.", "scores": {"content": 60, "behavior": 52, "context": 65, "overall": 59}, "data_sources": "Email gateway, legal contract management system, research collaboration portal", "dlp_system": "Purview", "dlp_alerted": "Yes", "timeline": [{"time": "09:30", "desc": "Megan exported drug interaction query results for three pipeline compounds"}, {"time": "09:45", "desc": "Megan emailed results to academic collaborator at university medical center"}, {"time": "09:46", "desc": "Purview flagged outbound email containing pipeline compound identifiers"}, {"time": "11:00", "desc": "Legal reviewed and confirmed the compound-specific DPA had not been executed"}], "tags": ["academic-collaboration", "dpa-missing", "pipeline-compounds", "drug-interactions", "ip-risk", "pharma", "medium"]}, {"n": 233, "title": "Medical Information Letters Shared with Field Sales", "industry": "pharma", "severity": "high", "sender": {"name": "Janet Okonkwo", "role": "Medical Information Specialist", "dept": "Medical Affairs", "location": "Thousand Oaks, California", "tenure": "Feb 2020", "risks": ["None. Wanted to help the sales team respond to common physician questions. Did not realize sharing off-label response letters with commercial teams crossed a regulatory boundary."]}, "recipient": {}, "email": {}, "analysis": "**WHO** -- Medical Information Specialist, no risk factors or malicious intent. Genuinely trying to help the sales team respond to common physician questions. Did not understand that the Medical-Commercial information barrier exists for federal regulatory reasons. **WHAT** -- 15 medical information response letters addressing off-label use questions, including pediatric atopic dermatitis data (not FDA-approved for this population), unapproved combination therapy protocols, and post-hoc comparative efficacy analyses vs. competitor biologics. These letters are restricted to reactive Medical Affairs distribution under FDA guidance on unsolicited request responses. **WHO received** -- Regional field sales team (internal) via shared drive — but with documented downstream regulatory harm: three sales representatives already referenced the off-label data in physician interactions (call notes, lunch-and-learn, formulary defense meeting), converting reactive medical information into proactive off-label promotion. This is High because: while Janet's intent was benign and distribution was internal, the Medical-Commercial information barrier is a hard FDA regulatory line, not a soft policy preference. Proactive distribution of off-label response letters to the sales force, with documented downstream use in physician promotion, crosses from policy violation into federal regulatory territory (FDCA off-label promotion, Anti-Kickback Statute implications). This category of violation has generated multi-billion-dollar DOJ settlements against pharmaceutical companies. The three confirmed instances of downstream off-label promotion create concrete regulatory exposure that goes beyond coaching-level remediation. Requires compliance investigation, assessment of the three physician interactions for adverse event reporting obligations, removal of documents from sales-accessible locations, and potential voluntary disclosure to FDA if the off-label promotion instances are deemed material.", "scores": {"content": 75, "behavior": 60, "context": 78, "overall": 71}, "data_sources": "SharePoint access logs, shared drive permissions audit, field sales CRM activity logs", "dlp_system": "Symantec", "dlp_alerted": "No", "timeline": [{"time": "Monday 14:00", "desc": "Janet copied 15 medical information response letters to regional sales shared drive"}, {"time": "Tuesday-Thursday", "desc": "Three sales reps accessed the letters and referenced them in physician call notes"}, {"time": "Friday 09:00", "desc": "Commercial compliance audit discovered off-label response letters in sales-accessible location"}, {"time": "Friday 10:30", "desc": "Medical Affairs director initiated investigation into the distribution breach"}], "tags": ["off-label", "medical-information", "sales-force", "information-barrier", "fda-compliance", "pharma", "high", "regulatory-violation", "medical-commercial-barrier"]}, {"n": 234, "title": "Sales Territory Data Sent to Wrong Regional Distribution List", "industry": "pharma", "severity": "medium", "sender": {"name": "Kevin Tran", "role": "Commercial Operations Analyst", "dept": "Commercial", "location": "Bridgewater, New Jersey", "tenure": "Sep 2021", "risks": ["None. Email autocomplete selected the wrong distribution list."]}, "recipient": {}, "email": {"from": "kevin.tran@abbvie.com", "to": "ne-region-all@abbvie.com (Northeast Regional Sales - 340 recipients)", "date": "Monday, Mar 2, 2026, 2:16 PM", "subject": "FY27 Territory Realignment Summary - CONFIDENTIAL", "body": "Hi team,\n\nPlease find attached the FY27 sales force realignment summary for your review ahead of Thursday's planning meeting. This includes the full breakdown for all five US regions.\n\nKey changes:\n- 23 territories consolidated (net reduction of 18 headcount positions)\n- 47 physician reassignments across the Southeast and Midwest regions\n- New specialty overlay territories in oncology (adding 12 positions)\n- Updated quota allocations reflecting the Skyrizi/Rinvoq growth trajectory\n\nPlease keep this confidential until the official communication cascade begins on March 20.\n\nThanks,\nKevin\n\n[Attached: FY27_Territory_Realignment_Full_US.xlsx -- territory boundaries, physician reassignments, quota allocations, headcount changes for all 5 regions]"}, "analysis": "**WHO** -- Commercial Operations Analyst, no risk factors, clear human error from email autocomplete selecting the wrong distribution list. He even marked it CONFIDENTIAL and asked recipients to keep it private, showing awareness of sensitivity. **WHAT** -- Complete FY27 sales force realignment data including territory consolidations, 18 headcount reductions, physician reassignments, and quota allocations for all five US regions. This data reveals which territories are being eliminated three weeks before affected employees were to be individually notified. **WHO received** -- 340 Northeast regional field sales representatives instead of the 12-person Commercial Ops Leadership team. Some recipients are in territories being eliminated. This is Medium because: it's a clear autocomplete error (not malicious), the distribution was entirely internal, and Kevin tried to recall the message immediately. However, premature revelation of territory eliminations and headcount reductions can trigger panic, attrition of high performers, and customer disruption as representatives preemptively reach out to physicians about potential changes. Coach on email distribution list verification practices, coordinate with HR on accelerated communication to affected employees, and assess the recall success rate.", "scores": {"content": 60, "behavior": 50, "context": 65, "overall": 58}, "data_sources": "Email gateway, distribution list membership, change management timeline documentation", "dlp_system": "Forcepoint", "dlp_alerted": "Yes", "timeline": [{"time": "14:15", "desc": "Kevin composed email with territory realignment summary attached"}, {"time": "14:16", "desc": "Kevin sent email to Northeast regional list instead of Commercial Ops leadership"}, {"time": "14:17", "desc": "Forcepoint flagged Highly Confidential document sent to broad distribution"}, {"time": "14:25", "desc": "Kevin realized the error and notified his manager; recall attempted but 280+ had already opened"}], "tags": ["wrong-recipient", "territory-realignment", "accidental-disclosure", "distribution-list-error", "pharma", "medium"]}, {"n": 235, "title": "Patient Assistance Metrics Discussed Beyond Approved Talking Points", "industry": "pharma", "severity": "medium", "sender": {"name": "Danielle Prescott", "role": "Patient Access Director", "dept": "Market Access", "location": "Indianapolis, Indiana", "tenure": "Aug 2015", "risks": ["None. Passionate about patient access programs and proud of the team's results."]}, "recipient": {}, "email": {}, "analysis": "**WHO** -- Patient Access Director, no risk factors, genuinely proud of her team's program results and passionate about demonstrating the value of patient assistance programs. Her approved talking points covered general program impact but not specific financial data. **WHAT** -- Specific PAP utilization metrics (89% approval rate, $1,847 average copay assistance), demographic breakdowns, total program cost ($127M), year-over-year growth (23%), and ROI calculation ($3.40 return per dollar). None of these specific figures had been publicly disclosed. **WHO received** -- Industry conference audience plus a journalist from BioPharma Dive who published the specific figures the following day. This is Medium because: the conference appearance was approved, Danielle's enthusiasm for the program is genuine, and patient access advocacy is valued by the company. However, specific PAP financial data can be used by payers to challenge pricing strategy (\"you can afford $127M in assistance so lower the list price\"), by competitors to benchmark their programs, and by advocacy groups in pricing debates. The journalist's publication amplifies the exposure beyond the conference audience. Coach on staying within approved talking points at industry events, especially regarding specific financial data, and coordinate with communications on responding to the published article.", "scores": {"content": 58, "behavior": 55, "context": 62, "overall": 58}, "data_sources": "Conference recording, approved talking points document, media monitoring", "dlp_system": "Netskope", "dlp_alerted": "No", "timeline": [{"time": "09:30", "desc": "Danielle began conference panel presentation on patient access"}, {"time": "09:50", "desc": "Danielle cited specific PAP utilization metrics and cost data beyond approved scope"}, {"time": "10:15", "desc": "Panel concluded; journalist approached Danielle for additional quotes"}, {"time": "Next day 07:00", "desc": "Industry publication ran article citing Danielle's specific financial figures"}], "tags": ["conference", "talking-points", "patient-assistance", "media-exposure", "market-access", "pharma", "medium"]}, {"n": 236, "title": "Competitive Intelligence Report Shared with Entire Field Sales Force", "industry": "pharma", "severity": "medium", "sender": {"name": "Ross Chambers", "role": "Competitive Intelligence Manager", "dept": "Commercial", "location": "Rahway, New Jersey", "tenure": "Jan 2019", "risks": ["None. Wanted the field force to be prepared for a competitor launch and sent to the broad list for speed."]}, "recipient": {}, "email": {"from": "ross.chambers@abbvie.com", "to": "us-field-sales-all@abbvie.com (1,200 recipients)", "date": "Thursday, Mar 5, 2026, 8:15 AM", "subject": "URGENT: Competitor Biosimilar Launch Intel - Action Required", "body": "Team,\n\nWanted to make sure everyone has this ahead of the competitor's expected launch announcement tomorrow. We need to be ready with our counter-positioning.\n\nKey intelligence:\n- Competitor X is launching their Humira biosimilar at a 68% discount to WAC (we had estimated 55-60%)\n- They've secured preferred formulary status with three major PBMs through aggressive contract terms we've obtained details on (see attached)\n- Our recommended counter-positioning: emphasize switching costs, patient support program superiority, and the physician familiarity advantage\n- Internal analysis of their manufacturing cost structure suggests they can't sustain this pricing below [threshold details in report]\n\nFull report attached. This is marked Leadership Only but I think everyone needs to see it given the timeline.\n\nRoss\n\n[Attached: Biosimilar_Competitive_Intel_Q1_2026_LEADERSHIP_ONLY.pdf -- 28 pages including competitor contract analysis, pricing strategy, and counter-positioning playbook]"}, "analysis": "**WHO** -- Competitive Intelligence Manager, no risk factors, motivated by urgency to prepare the field force for a competitor launch. He made a conscious decision to override the distribution classification because he believed the timeline justified it. **WHAT** -- Detailed CI report marked Leadership Only, containing analysis of a competitor's contract terms with major PBMs, pricing strategy (68% discount), manufacturing cost structure analysis, and the company's counter-positioning strategy. **WHO received** -- All 1,200 US field sales representatives instead of the 35-person Commercial Leadership Team. An eleven-fold expansion of the intended audience. This is Medium because: the intent was competitive preparedness (not malicious), the distribution was entirely internal, and some field awareness of competitor launches is appropriate. However, CI reports containing competitor contract analysis and manufacturing cost estimates could leak through the 1,200-person distribution (social connections, former colleagues at competitors, inadvertent sharing during physician interactions). The leadership-only classification exists to protect intelligence sources and methods. Additionally, distributing analysis of competitor trade secrets to a broad audience may increase legal exposure. Coach on respecting distribution classifications, using the tiered information dissemination process (leadership gets full report, field gets approved talking points), and the difference between field-appropriate competitive awareness and restricted intelligence.", "scores": {"content": 62, "behavior": 52, "context": 60, "overall": 58}, "data_sources": "Email gateway, distribution list audit, CI report classification tags", "dlp_system": "Symantec", "dlp_alerted": "Yes", "timeline": [{"time": "08:00", "desc": "Ross finalized the biosimilar competitive intelligence report marked Leadership Only"}, {"time": "08:15", "desc": "Ross sent the report to the US Field Sales all-hands distribution list"}, {"time": "08:16", "desc": "Symantec flagged Leadership Only document sent to distribution list with 1,200 members"}, {"time": "08:45", "desc": "VP Commercial contacted Ross after multiple field managers reported receiving the CI report"}], "tags": ["competitive-intelligence", "over-distribution", "biosimilar", "field-sales", "classification-violation", "pharma", "medium"]}, {"n": 237, "title": "Medical Education Grant Criteria Posted to Broad Internal Wiki", "industry": "pharma", "severity": "medium", "sender": {"name": "Laura Sinclair", "role": "Medical Education Manager", "dept": "Medical Affairs", "location": "Worcester, Massachusetts", "tenure": "Mar 2020", "risks": ["None. Accidentally set wiki page permissions to All Employees during setup."]}, "recipient": {}, "email": {}, "analysis": "**WHO** -- Medical Education Manager, no risk factors, accidentally set wiki permissions during page creation. A simple setup error, not intentional oversharing. **WHAT** -- Medical education grant evaluation criteria, scoring rubric, approved recipient list with individual scores and grant amounts, total budget allocation, and reviewer comments. This information is restricted to Medical Education and Compliance under OIG guidelines governing industry-funded medical education. **WHO received** -- Company-wide wiki access, with 45 employees outside Medical Affairs (including 12 from Commercial) accessing the page before the permissions error was discovered. This is Medium because: it's a clear permissions accident (not intentional), the distribution was internal only, and Laura corrected the error as soon as it was flagged. However, broad visibility of grant evaluation criteria and recipient scores by commercial teams could be used to influence future grant applications toward programs that favor the company's products, creating an appearance of commercial bias in independent medical education funding. This violates the OIG-mandated separation between medical education and commercial operations. Correct the permissions, audit which commercial team members accessed the page, assess whether any grant-related decisions need to be reviewed, and coach on wiki permissions best practices.", "scores": {"content": 55, "behavior": 50, "context": 62, "overall": 56}, "data_sources": "Wiki access logs, permission audit, compliance monitoring", "dlp_system": "Purview", "dlp_alerted": "No", "timeline": [{"time": "10:00", "desc": "Laura created wiki page with grant evaluation materials"}, {"time": "10:05", "desc": "Laura set page permissions to All Employees instead of Medical Education team"}, {"time": "10:30-14:00", "desc": "45 employees outside Medical Affairs accessed the page, including 12 from Commercial"}, {"time": "14:30", "desc": "Compliance audit flagged cross-functional access to grant evaluation materials"}], "tags": ["medical-education", "wiki-permissions", "compliance", "oig-guidelines", "internal-oversharing", "pharma", "medium"]}, {"n": 238, "title": "Batch Deviation Records Accessed Outside Assigned Product Line", "industry": "pharma", "severity": "medium", "sender": {"name": "Hiroshi Tanaka", "role": "Quality Assurance Analyst", "dept": "Manufacturing", "location": "Kalamazoo, Michigan", "tenure": "Nov 2018", "risks": ["Applied for QA lead role on the oncology product line. Access to deviation records was likely motivated by interview preparation."]}, "recipient": {}, "email": {}, "analysis": "**WHO** -- QA Analyst, preparing for an internal interview for the QA Lead role on the oncology line. His motivation is career advancement, and reviewing deviation history to understand the product's quality challenges before an interview is a rational (if unauthorized) preparation strategy. **WHAT** -- Batch deviation records, CAPA records, and batch release decisions for three product lines outside his authorized immunology assignment. Under GMP regulations, these records are subject to strict access controls because they may contain information about product quality issues that could be material to regulatory submissions or investor communications. **WHO received** -- N/A (internal access anomaly, no external sharing detected). This is Medium because: the data was accessed but not shared externally, the motivation (interview prep) is plausible and benign, and Hiroshi has the technical qualifications to understand and appropriately handle quality data. However, unauthorized access to GMP-controlled records, even with benign intent, undermines data integrity controls required by FDA and may need to be documented as a GMP deviation. Coach on the proper process for requesting cross-product-line data access, note this access in the GMP deviation log, and suggest his manager provide appropriate quality overview materials for the internal interview process.", "scores": {"content": 55, "behavior": 60, "context": 58, "overall": 58}, "data_sources": "Quality management system access logs, role-based access control records, HR internal transfer records", "dlp_system": "Forcepoint", "dlp_alerted": "No", "timeline": [{"time": "Week 1", "desc": "Hiroshi accessed oncology product batch deviation records across 5 sessions"}, {"time": "Week 2", "desc": "Hiroshi expanded access to rare disease product CAPA records"}, {"time": "Week 2 Thursday", "desc": "QMS access anomaly detection flagged cross-product-line queries"}, {"time": "Week 2 Friday", "desc": "QA director reviewed access logs and identified correlation with internal transfer"}], "tags": ["access-anomaly", "batch-deviation", "gmp", "cross-product", "internal-transfer", "pharma", "medium"]}, {"n": 239, "title": "Specialty Pharmacy Data Used in Employee MBA Capstone", "industry": "pharma", "severity": "high", "sender": {"name": "Christina Morales", "role": "Distribution Operations Analyst", "dept": "Commercial", "location": "Covington, Kentucky", "tenure": "Jun 2019", "risks": ["Part-time MBA program (approved educational benefit). Did not complete the required data use review with Legal before using company data in academic work."]}, "recipient": {}, "email": {}, "analysis": "**WHO** -- Distribution Operations Analyst, on approved educational benefit, no malicious intent. She credited the company and genuinely believed the educational benefit approval covered using company data in her capstone. **WHAT** -- Specialty pharmacy distribution data including fill rates by channel partner (Accredo 34%, CVS Specialty 28%, Optum 22%), patient hub conversion funnels with actual enrollment numbers (12,400 patients through full funnel), distribution margin structures by channel, and copay assistance utilization rates by insurance type. This is proprietary commercial intelligence that directly reveals the company's channel economics, partner performance, and patient access strategy. **WHO received** -- MBA cohort of 24 students that explicitly includes employees from Merck, Pfizer, and Novartis (direct competitors in biologics). The capstone may also be permanently archived in the university's academic repository. This is High because: unlike accidental misdirection or internal over-sharing, the proprietary channel economics and distribution margins were directly presented to identified competitor employees who can immediately leverage this intelligence for their own distribution negotiations. The audience included people from the three companies most directly positioned to use fill rate data, conversion funnels, and margin structures competitively. The potential for permanent university archival makes this irrecoverable. While Christina had no malicious intent and the educational benefit was approved, the combination of competitively actionable data + confirmed competitor recipients + potential permanent publication exceeds coaching-level MEDIUM. Requires legal assessment of the university archival status, competitive damage evaluation, review of the educational benefit policy data use requirements, and engagement with Christina on the distinction between approved educational participation and unauthorized data disclosure.", "scores": {"content": 72, "behavior": 58, "context": 76, "overall": 70}, "data_sources": "University capstone submission records, educational benefit program files, distribution database access logs", "dlp_system": "Netskope", "dlp_alerted": "No", "timeline": [{"time": "2 months prior", "desc": "Christina began extracting specialty pharmacy data for capstone research oved", "patient-advocacy", "educational-materials", "pharma", "low"]}, {"n": 249, "title": "Personal Health Insurance Documents Emailed to Spouse", "industry": "pharma", "severity": "low", "sender": {"name": "James Whitfield", "role": "Regulatory Affairs Associate", "dept": "Regulatory Affairs", "location": "Rahway, NJ", "tenure": "Jan 2022", "risks": ["None. Personal administrative activity during open enrollment period."]}, "recipient": {}, "email": {"from": "james.whitfield@abbvie.com", "to": "sarah.whitfield@gmail.com", "date": "Monday, March 3, 2026, 5:00 PM", "subject": "Open enrollment docs — need your input tonight", "body": "Sarah,\n\nSending over the open enrollment documents so we can review them together tonight. The deadline is Friday and I want to make sure we pick the right plan for the family.\n\nAttached:\n- Benefits summary (PPO vs HDHP comparison)\n- FSA election form\n- Current plan coverage details\n- Dental and vision options\n\nThese are my personal benefits enrollment documents — no work-related content. Just need your help deciding between the PPO and the high-deductible option given the kids' orthodontist appointments this year.\n\nSee you at home.\n— James"}, "analysis": "AXIA's WHO/WHAT/WHO analysis: **WHO** — James Whitfield is a regulatory affairs associate sending personal benefits documents to his spouse during open enrollment; no behavioral risk factors. **WHAT** — The content is exclusively personal benefits enrollment information: health plan comparisons, FSA election forms, and coverage details. Standard employer-provided benefits documentation that is personal to the employee. No company proprietary data, drug development information, or business-sensitive content is involved. **WHO received** — His spouse's personal Gmail address, consistent with the common practice of coordinating family health plan decisions during open enrollment. DLP flagged the email because it contained health-related terminology, personal identifiers, and  agreement; alert closed"}], "tags": ["false-positive", "conference-poster", "public-presentation", "co-authorship", "academic-collaboration", "pharma", "low"]}];
const MD_CONTENT = "# AXIA Severity Classification Test Suite -- Batch 3\n\n**Version:** 3.7\n**Date:** 2026-03-09\n**Total Examples:** 100 (Examples 151-250)\n**Framework:** WHO sent it / WHAT it contains / WHO received it\n**Sector Focus:** Energy (Chevron) & Pharma (AbbVie)\n**Format:** Sender Context, Recipient Context, Email/Captured Content, Why This Severity (WHO/WHAT/WHO analysis)\n\n## Distribution\n\n| Severity | Count | Examples |\n|----------|-------|----------|\n| CRITICAL | 25 | 151-156, 179-197 |\n| HIGH | 28 | 157-162, 198-216, 223, 233, 239 |\n| MEDIUM | 22 | 165-166, 217-222, 224-232, 234-238 |\n| LOW | 25 | 163-164, 167-178, 240-250 |\n| **Total** | **100** | |\n\n| Vertical | Count |\n|----------|-------|\n| Energy | 50 |\n| Pharma | 50 |\n\n## Severity Guidelines\n\nUse the WHO/WHAT/WHO framework:\n- WHO sent it (role, access, behavioral signals)\n- WHAT it contains (data type, sensitivity, volume)\n- WHO received it (authorization, relationship, organizational controls)\n\n**Severity scale:**\n- CRITICAL (90-100): Requires immediate escalation to Legal and CISO, evidence preservation. The most severe incidents.\n- HIGH (70-89): Requires manager notification and evidence preservation. Serious but with some mitigating factors.\n- MEDIUM (50-69): Requires employee coaching. Policy violation that can be corrected through guidance.\n- LOW (0-49): Can be auto-resolved. Legitimate activity or false positive.\n\n---\n\n## Example 151: APOLO production models and Permian Basin well data exfiltrated before departure [Energy]\n\n**Severity: CRITICAL**\n\n### Sender Context\n- **Name:** Marcus Torres\n- **Role:** Senior Reservoir Engineer\n- **Department:** Upstream\n- **Location:** Midland, TX\n- **Joined:** Jun 2019\n- **Risk Factors:** Layoff notification received 12 days ago; Accepted offer at ConocoPhillips; Key contributor to APOLO production models\n\n### Recipient Context\n- **Name:** Marcus Torres (personal)\n- **Organization:** Personal Google Drive\n- **Relationship:** Self \u2014 personal cloud account with no business authorization. No approved external transfer channel.\n\n### Email\n\n**From:** marcus.torres@chevron.com\n**To:** marcustorres.eng@gmail.com\n**Date:** Thursday, Mar 6, 2026, 11:42 PM\n**Subject:** Backup - personal reference files\n\nHey,\n\nSyncing my working files to Drive before everything gets locked out. Here's the full set:\n\n- APOLO production forecasting model (complete source + training datasets)\n- Permian Basin well completion database \u2014 all 847 wells, petrophysical logs included\n- Autonomous fracturing algorithm docs (the 4 patent-pending ones)\n- Historical well performance data going back to 2021\n\n142 files, about 2.3 GB total. These are the models I built and maintained for the last 5 years. Want to make sure I have reference copies of my own work.\n\nMarcus\n\n\n### Why This Severity\n\n**WHO** \u2014 Senior Reservoir Engineer with layoff notification 12 days ago, confirmed offer at ConocoPhillips (direct competitor). 18x volume spike above 6-month baseline, accessing APOLO repositories untouched in 8 months, activity concentrated 10 PM-2 AM. **WHAT** \u2014 APOLO production forecasting model source code and AI training datasets, Permian Basin well completion data for 847 wells, and 4 patent-pending autonomous fracturing algorithms. Combined IP value exceeds $50M. The Propel Fuels v. Phillips 66 precedent ($604.9M verdict for 77 trade secrets) establishes massive damages potential. **WHO received** \u2014 Personal Gmail / Google Drive, no approved external destination. The combination of impending departure to a competitor, bulk download of the company's most valuable shale optimization IP, and personal cloud exfiltration during off-hours makes this unambiguously Critical. DLP sees \"engineer backs up files\" \u2014 AXIA sees systematic IP collection before joining a direct competitor.\n\n### Risk Score Factors\n- **Content:** 98\n- **Behavior:** 96\n- **Context:** 97\n- **Overall Score:** 97\n\n### Data Sources\nMicrosoft 365, Google Drive (Netskope), Workday HR, Entra ID, APOLO System Logs\n\n### DLP Status\n- **DLP System:** Purview\n- **DLP Alerted:** No\n\n### Timeline\n- **12 days ago**: Workday: Layoff notification issued to Marcus Torres\n- **8 days ago**: LinkedIn profile updated: \"Open to opportunities\" \u2014 connection requests from ConocoPhillips and Pioneer recruiters\n- **3 days ago**: First unusual access: APOLO model repository (hadn't accessed in 8 months)\n- **2 days ago**: Bulk download: 847 well completion records from Permian Basin database\n- **28m ago**: Chrome sync detected: 142 files (2.3 GB) syncing to personal Google Drive\n- **15m ago**: AXIA: Manager notified, HR notified, silent evidence collection initiated\n\n### Tags\ndeparture-risk, ip-exfiltration, workforce-reduction, apolo, permian-basin\n\n---\n\n## Example 152: Skyrizi/Rinvoq biologics formulation data exfiltrated from ELN and Veeva Vault before departure [Pharma]\n\n**Severity: CRITICAL**\n\n### Sender Context\n- **Name:** Dr. Rachel Nguyen\n- **Role:** Senior Research Scientist, Biologics\n- **Department:** R&D\n- **Location:** Worcester, MA\n- **Joined:** Aug 2019\n- **Risk Factors:** Resignation submitted 12 days ago; Accepted offer at Amgen (biosimilar competitor); Key contributor to Skyrizi manufacturing process development\n\n### Recipient Context\n- **Name:** Dr. Rachel Nguyen (personal)\n- **Organization:** Personal Dropbox\n- **Relationship:** Self \u2014 personal cloud storage with no business authorization.\n\n### Email\n\n**From:** rachel.nguyen@abbvie.com\n**To:** r.nguyen.bio@gmail.com\n**Date:** Wednesday, Mar 5, 2026, 12:18 AM\n**Subject:** Research reference - biologics process docs\n\nHi,\n\nSaving my process development work before access expires. Dropbox link below.\n\nWhat's included:\n- Skyrizi (risankizumab) IL-23 antibody cell line specs \u2014 CHO line parameters\n- Mammalian cell culture conditions and fermentation profiles\n- Rinvoq (upadacitinib) JAK inhibitor purification SOPs\n- 3 years of biologics stability testing data\n\n74 files, 1.8 GB. Most of this is work I personally developed or co-authored during my time on the Skyrizi manufacturing team.\n\n\u2014 Rachel\n\n\n### Why This Severity\n\n**WHO** \u2014 Senior Research Scientist departing in 8 days to Amgen's biosimilar division (direct competitive threat). 22x download spike above 6-month baseline from ELN and Veeva Vault, accessing Rinvoq protocols untouched in 6 months, late-night activity (11 PM-3 AM). **WHAT** \u2014 Skyrizi ($17.6B revenue) and Rinvoq ($8.3B revenue) biologics manufacturing processes: cell line specifications, fermentation conditions, purification protocols. These are AbbVie's crown jewels \u2014 tens of billions in value. A single departing process scientist could enable a biosimilar competitor. **WHO received** \u2014 Personal Dropbox via personal Gmail, no authorized external channel. The Lupin v. Zeng precedent (VP who copied 128 files on last day, criminally prosecuted) is directly applicable. Departing to a biosimilar competitor with the exact manufacturing know-how needed to replicate AbbVie's top two products makes this maximum severity.\n\n### Risk Score Factors\n- **Content:** 98\n- **Behavior:** 96\n- **Context:** 97\n- **Overall Score:** 97\n\n### Data Sources\nMicrosoft 365, Dropbox (Netskope), Workday HR, Entra ID, ELN Access Logs, Veeva Vault Audit Trail\n\n### DLP Status\n- **DLP System:** Purview\n- **DLP Alerted:** No\n\n### Timeline\n- **12 days ago**: Workday: Resignation submitted by Dr. Rachel Nguyen\n- **10 days ago**: LinkedIn: Profile updated, Amgen listed as next role (biosimilar division)\n- **3 days ago**: First unusual access: Rinvoq purification SOPs (hadn't accessed in 6 months)\n- **2 days ago**: Bulk download: Skyrizi cell line specifications + fermentation parameters from ELN\n- **28m ago**: Dropbox sync detected: 74 files (1.8 GB) syncing to personal erial and could move CVX stock price. **WHO received** \u2014 Personal iCloud, with concurrent evidence of Hess options interest on Bloomberg. This creates SEC insider trading liability (10b-5), potential FTC consent decree violation, and criminal prosecution risk (DOJ). The convergence of MNPI access, personal cloud exfiltration, and trading-related research on the same target makes this Critical.\n\n### Risk Score Factors\n- **Content:** 98\n- **Behavior:** 92\n- **Context:** 95\n- **Overall Score:** 95\n\n### Data Sources\nMicrosoft 365, iCloud (Netskope), Bloomberg Terminal Logs, Workday HR, Deal Room Access Logs\n\n### DLP Status\n- **DLP System:** Netskope\n- **DLP Alerted:** No\n\n### Timeline\n- **3 days ago**: Unusual access: FTC submission documents (outside authorized scope)\n- **2 days ago**: Bulk download: 34 deal room documents including synergy models\n- **1 day ago**: Bloomberg terminal: Hess options pricing queries (unusual for integration role)\n- **6h ago**: Netskope: Screenshots of deal financial models syncing to personal iCloud\n- **1h ago**: AXIA: Case created, Legal notified, data room access suspended pending review\n\n### Tags\nmnpi, sec-risk, hess-acquisition, deal-room, insider-trading\n\n---\n\n## Example 154: Unblinded Phase III tavapadon results shared with financial contact, personal stock trading detected [Pharma]\n\n**Severity: CRITICAL**\n\n### Sender Context\n- **Name:** Michael Torres\n- **Role:** Director, Clinical Operations\n- **Department:** R&D\n- **Location:** North Chicago, IL\n- **Joined:** Mar 2021\n- **Risk Factors:** Access to unblinded Phase III data (MNPI); Personal financial advisor contact detected; ABBV options trading from personal brokerage concurrent with data access\n\n### Recipient Context\n- **Name:** James Hartley\n- **Organization:** Hartley Wealth Management (FINRA CRD #4421893)\n- **Relationship:** Personal financial advisor \u2014 not on AbbVie's Investor Relations approved contact list. No business relationship with AbbVie.\n\n### Email\n\n**From:** michael.torres@abbvie.com\n**To:** j.hartley@hartleywealth.com\n**Date:** Monday, Mar 3, 2026, 7:48 PM\n**Subject:** Quick update - worth a conversation\n\nJames,\n\nWanted to give you a heads up on something. The Phase III tavapadon data just came in and the primary endpoint hit \u2014 statistically significant improvement in UPDRS scores for Parkinson's. This hasn't been announced yet, probably a few weeks out.\n\nI know we talked about ABBV being undervalued relative to the pipeline. This would be a pretty significant catalyst when it goes public.\n\nLet's talk tomorrow before the market opens?\n\nMike\n\n\n### Why This Severity\n\n**WHO** \u2014 Director of Clinical Operations with access to unblinded Phase III data, sending MNPI to a FINRA-registered financial advisor. Concurrent Bloomberg queries on ABBV options pricing and personal brokerage purchases of ABBV call options ($47K) in the same 48-hour window. Torres is not in the pre-clearance window per AbbVie's insider trading compliance program. **WHAT** \u2014 Unblinded Phase III tavapadon (Parkinson's disease) efficacy results showing positive primary endpoint. This is textbook Material Non-Public Information \u2014 with AbbVie's $407B market cap, a successful Parkinson's drug could move the stock by billions. **WHO received** \u2014 Personal financial advisor at a wealth management firm, via corporate email. The combination of MNPI disclosure + financial advisor recipient + concurrent personal options trading constitutes clear SEC insider trading liability (Section 10b-5), potential criminal prosecution (DOJ), and FDA regulatory consequences. This is as severe as insider trading cases get.\n\n### Risk Score Factors\n- **Content:** 98\n- **Behavior:** 94\n- **Context:** 93\n- **Overall Score:** 95\n\n### Data Sources\nMicrosoft 365, Gmail (Netskope), Bloomberg Terminal Logs, Workday HR, Clinical Trial Management System\n\n### DLP Status\n- **DLP System:** Netskope\n- **DLP Alerted:** No\n\n### Timeline\n- **3 days ago**: Unusual access: Full unblinded Phase III tavapadon dataset (normally blinded summaries only)\n- **2 days ago**: Personal email: Efficacy summary sent to FINRA-registered financial advisor\n- **1 day ago**: Bloomberg terminal: ABBV options pricing queries (unusual for clinical ops role)\n- **6h ago**: Brokerage activity: ABBV call options purchased ($47K) via personal Schwab account\n- **1h ago**: AXIA: Case created, Legal notified, clinical data access suspended pending review\n\n### Tags\nmnpi, sec-risk, clinical-trial, tavapadon, insider-trading, phase-iii\n\n---\n\n## Example 155: Trading positions and LNG contract pricing exfiltrated to encrypted email [Energy]\n\n**Severity: CRITICAL**\n\n### Sender Context\n- **Name:** David Chen\n- **Role:** Senior Crude Oil Trader\n- **Department:** Supply & Trading\n- **Location:** Houston, TX\n- **Joined:** Sep 2018\n- **Risk Factors:** Negotiating employment with Vitol (competitor trading house); Cross-boundary access to LNG data (unusual for crude desk); Anti-forensics: cleared browser history and deleted sent items\n\n### Recipient Context\n- **Name:** David Chen (personal)\n- **Organization:** Personal ProtonMail \u2014 encrypted, untraceable\n- **Relationship:** Self \u2014 personal encrypted email account created 3 days ago. No prior ProtonMail usage.\n\n### Email\n\n**From:** david.chen@chevron.com\n**To:** d.chen.trading@protonmail.com\n**Date:** Saturday, Mar 1, 2026, 1:34 AM\n**Subject:** Reference materials\n\nSending over the trading book for reference.\n\nAttached:\n- 18 months of crude positions with P&L by strategy\n- Full counterparty database (2,400+ entities, credit limits, exposure data)\n- LNG contract pricing schedules \u2014 spot and forward curves\n- Cargo allocation schedules for 47 committed cargoes Q2-Q3\n\nI know the LNG stuff isn't technically my desk but it'll be useful context for the new role.\n\nDC\n\n\n### Why This Severity\n\n ant evaluation materials\n\n### Tags\nmedical-education, wiki-permissions, compliance, oig-guidelines, internal-oversharing, pharma, medium\n\n---\n\n## Example 238: Batch Deviation Records Accessed Outside Assigned Product Line [Pharma]\n\n**Severity: MEDIUM**\n\n### Sender Context\n- **Name:** Hiroshi Tanaka\n- **Role:** Quality Assurance Analyst\n- **Department:** Manufacturing\n- **Location:** Kalamazoo, Michigan\n- **Joined:** Nov 2018\n- **Risk Factors:** Applied for QA lead role on the oncology product line. Access to deviation records was likely motivated by interview preparation.\n\n### Email (System access alert, generated by AXIA)\n\n**Source:** Quality Management System (QMS) access logs\n**Detection:** Access anomaly detection, cross-product-line query pattern\n**Period:** Two weeks of deviation record queries across unassigned product lines\n\n[AXIA Access Anomaly Alert]\n\nUser: Hiroshi Tanaka (QA Analyst, Immunology product line)\nSystem: TrackWise Quality Management System\n\nAnomalous access pattern detected:\n- Week 1: 5 sessions accessing oncology product batch deviation records (ABBV-Onc-01, ABBV-Onc-02)\n  - Reviewed: 34 deviation reports, 12 CAPA records, 8 batch release decisions\n- Week 2: Expanded to rare disease product line (ABBV-RD-01)\n  - Reviewed: 18 deviation reports, 6 CAPA records\n- Total: 68 deviation records and 18 CAPA records across 3 unassigned product lines\n- Access times: During business hours, consistent with research pattern\n\nUser's role authorization: Immunology product line only\nCross-product access: Not requested through management or quality leadership\nHR context: Hiroshi has pending internal transfer application for QA Lead role on oncology line (applied 3 weeks ago)\n\n### Why This Severity\n\n**WHO** -- QA Analyst, preparing for an internal interview for the QA Lead role on the oncology line. His motivation is career advancement, and reviewing deviation history to understand the product's quality challenges be let activeFilter = 'all';
let searchTerm = '';

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function renderCard(ex) {
  const s = ex.sender || {};
  const r = ex.recipient || {};
  const e = ex.email || {};
  const sc = ex.scores || {};

  let risksHtml = '';
  if (s.risks && s.risks.length > 0) {
    risksHtml = '<div class="risk-factors">' +
      s.risks.map(r => '<div class="risk-factor">' + esc(r) + '</div>').join('') +
      '</div>';
  }

  let recipHtml = '';
  if (r.name || r.org) {
    recipHtml = `<div class="context-box">
      <h4>Recipient Context</h4>
      ${r.name ? '<div class="field"><span class="field-label">Name</span><span class="field-value">' + esc(r.name) + '</span></div>' : ''}
      ${r.org ? '<div class="field"><span class="field-label">Org</span><span class="field-value">' + esc(r.org) + '</span></div>' : ''}
      ${r.rel ? '<div class="field"><span class="field-label">Relationship</span><span class="field-value">' + esc(r.rel) + '</span></div>' : ''}
    </div>`;
  }

  let emailHtml = '';
  if (e.body || e.from) {
    emailHtml = `<div class="section">
      <div class="section-title">Email / Captured Content</div>
      <div class="email-container">
        <div class="email-header">
          ${e.from ? '<div class="email-field"><span class="email-field-label">From</span><span class="email-field-value">' + esc(e.from) + '</span></div>' : ''}
          ${e.to ? '<div class="email-field"><span class="email-field-label">To</span><span class="email-field-value">' + esc(e.to) + '</span></div>' : ''}
          ${e.date ? '<div class="email-field"><span class="email-field-label">Date</span><span class="email-field-value">' + esc(e.date) + '</span></div>' : ''}
          ${e.subject ? '<div class="email-field"><span class="email-field-label">Subject</span><span class="email-field-value" style="font-weight:700">' + esc(e.subject) + '</span></div>' : ''}
        </div>
        <div class="email-body">${esc(e.body)}</div>
      </div>
    </div>`;
  }

  let analysisHtml = '';
  if (ex.analysis) {
    // Highlight WHO/WHAT
    let text = esc(ex.analysis);
    text = text.replace(/\b(WHO)\b/g, '<strong style="color:var(--accent-teal)">WHO</strong>');
    text = text.replace(/\b(WHAT)\b/g, '<strong style="color:var(--accent-teal)">WHAT</strong>');
    analysisHtml = `<div class="section">
      <div class="section-title">Why This Severity</div>
      <div class="analysis-box"><p>${text}</p></div>
    </div>`;
  }

  let scoresHtml = '';
  if (sc.overall) {
    scoresHtml = `<div class="section">
      <div class="section-title">Risk Score Factors</div>
      <div class="scores-row">
        ${sc.content !== undefined ? '<div class="score-item"><span class="score-label">Content</span><span class="score-value">' + sc.content + '</span></div>' : ''}
        ${sc.behavior !== undefined ? '<div class="score-item"><span class="score-label">Behavior</span><span class="score-value">' + sc.behavior + '</span></div>' : ''}
        ${sc.context !== undefined ? '<div class="score-item"><span class="score-label">Context</span><span class="score-value">' + sc.context + '</span></div>' : ''}
        <div class="score-item" style="border-color:var(--severity-${ex.severity})"><span class="score-label">Overall</span><span class="score-value">${sc.overall}</span></div>
      </div>
    </div>`;
  }

  let dsHtml = '';
  if (ex.data_sources) {
    dsHtml = `<div class="section">
      <div class="section-title">Data Sources</div>
      <div style="font-size:13px;color:var(--text-secondary);line-height:1.6;white-space:pre-wrap">${esc(ex.data_sources)}</div>
    </div>`;
  }

  let dlpHtml = '';
  if (ex.dlp_system) {
    dlpHtml = `<div class="dlp-row">
      <span class="dlp-tag">${esc(ex.dlp_system)}</span>
      ${ex.dlp_alerted ? '<span class="dlp-tag" style="color:var(--severity-high)">' + esc(ex.dlp_alerted) + '</span>' : ''}
    </div>`;
  }

  let tlHtml = '';
  if (ex.timeline && ex.timeline.length > 0) {
    tlHtml = `<div class="section">
      <div class="section-title">Timeline</div>
      <ul class="timeline-list">
        ${ex.timeline.map(t => '<li><span class="tl-time">' + esc(t.time) + '</span><span class="tl-desc">' + esc(t.desc) + '</span></li>').join('')}
      </ul>
    </div>`;
  }

  let tagsHtml = '';
  if (ex.tags && ex.tags.length > 0) {
    tagsHtml = '<div class="tags-row">' + ex.tags.map(t => '<span class="tag">' + esc(t) + '</span>').join('') + '</div>';
  }

  return `<div class="example-card severity-${ex.severity}" data-severity="${ex.severity}" data-industry="${ex.industry}" data-n="${ex.n}">
    <div class="card-header" onclick="toggleCard(this)">
      <div class="card-title-section">
        <span class="example-number">#${ex.n}</span>
        <span class="severity-badge ${ex.severity}">${ex.severity}</span>
        <span class="card-title">${esc(ex.title)}</span>
        <span class="industry-tag">${esc(ex.industry)}</span>
      </div>
      <span class="expand-icon">&#9660;</span>
    </div>
    <div class="card-body">
      <div class="section">
        <div class="section-title">Context</div>
        <div class="context-grid">
          <div class="context-box">
            <h4>Sender</h4>
            ${s.name ? '<div class="field"><span class="field-label">Name</span><span class="field-value">' + esc(s.name) + '</span></div>' : ''}
            ${s.role ? '<div class="field"><span class="field-label">Role</span><span class="field-value">' + esc(s.role) + '</span></div>' : ''}
            ${s.dept ? '<div class="field"><span class="field-label">Dept</span><span class="field-value">' + esc(s.dept) + '</span></div>' : ''}
            ${s.location ? '<div class="field"><span class="field-label">Location</span><span class="field-value">' + esc(s.location) + '</span></div>' : ''}
            ${s.tenure ? '<div class="field"><span class="field-label">Joined</span><span class="field-value">' + esc(s.tenure) + '</span></div>' : ''}
            ${risksHtml}
          </div>
          ${recipHtml}
        </div>
      </div>
      ${emailHtml}
      ${analysisHtml}
      ${scoresHtml}
      ${dsHtml}
      ${dlpHtml}
      ${tlHtml}
      ${tagsHtml}
    </div>
  </div>`;
}

function renderAll() {
  const container = document.getElementById('examples-container');
  container.innerHTML = examples.map(renderCard).join('');
  applyFilters();
}

function toggleCard(header) {
  header.closest('.example-card').classList.toggle('open');
}

function expandAll() {
  document.querySelectorAll('.example-card:not(.hidden)').forEach(c => c.classList.add('open'));
}

function collapseAll() {
  document.querySelectorAll('.example-card').forEach(c => c.classList.remove('open'));
}

function filterCards(filter) {
  activeFilter = filter;
  // Update active button
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  applyFilters();
}

function searchCards(term) {
  searchTerm = term.toLowerCase();
  applyFilters();
}

function applyFilters() {
  let visible = 0;
  document.querySelectorAll('.example-card').forEach(card => {
    const sev = card.dataset.severity;
    const ind = card.dataset.industry;
    const text = card.textContent.toLowerCase();

    let show = true;
    if (activeFilter !== 'all') {
      show = (sev === activeFilter || ind === activeFilter);
    }
    if (show && searchTerm) {
      show = text.includes(searchTerm);
    }

    card.classList.toggle('hidden', !show);
    if (show) visible++;
  });
  document.getElementById('visible-count').textContent = visible;
}

function downloadMD() {
  const blob = new Blob([MD_CONTENT], {type: 'text/markdown'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'severity-test-examples-batch3.md';
  a.click();
  URL.revokeObjectURL(a.href);
}

renderAll();
</script>
